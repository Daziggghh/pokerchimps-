<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Shadow -->
  <rect x="5" y="5" width="90" height="76" rx="18" fill="#4a35cc" opacity="0.6"/>
  <!-- Main bubble body -->
  <rect x="0" y="0" width="90" height="76" rx="18" fill="#7c6aff"/>
  <!-- Pink left accent stripe -->
  <rect x="0" y="0" width="9" height="76" rx="9" fill="#ff6ab0"/>
  <rect x="0" y="38" width="9" height="38" rx="0" fill="#ff6ab0"/>
  <rect x="0" y="57" width="9" height="19" rx="9" fill="#ff6ab0"/>
  <!-- Bubble tail -->
  <polygon points="16,74 4,98 38,74" fill="#7c6aff"/>
  <!-- B letterform - stem -->
  <rect x="16" y="18" width="8" height="40" rx="3" fill="white"/>
  <!-- B top bar -->
  <rect x="16" y="18" width="26" height="8" rx="4" fill="white"/>
  <!-- B middle bar -->
  <rect x="16" y="36" width="24" height="8" rx="4" fill="white"/>
  <!-- B bottom bar -->
  <rect x="16" y="50" width="26" height="8" rx="4" fill="white"/>
  <!-- B top right curve -->
  <rect x="37" y="18" width="8" height="26" rx="4" fill="white"/>
  <!-- B bottom right curve -->
  <rect x="37" y="42" width="8" height="16" rx="4" fill="white"/>
  <!-- C letterform -->
  <!-- C top bar -->
  <rect x="53" y="18" width="24" height="8" rx="4" fill="white"/>
  <!-- C bottom bar -->
  <rect x="53" y="50" width="24" height="8" rx="4" fill="white"/>
  <!-- C left stem -->
  <rect x="53" y="18" width="8" height="40" rx="4" fill="white"/>
</svg>
