<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle - dark poker green -->
  <circle cx="32" cy="32" r="32" fill="#0d1f0d"/>
  <!-- Felt texture ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#1a3a1a" stroke-width="2"/>
  <!-- Chimp face -->
  <circle cx="32" cy="34" r="18" fill="#8B4513"/>
  <!-- Chimp muzzle -->
  <ellipse cx="32" cy="40" rx="11" ry="9" fill="#D2691E"/>
  <!-- Eyes -->
  <circle cx="25" cy="28" r="5" fill="#fff"/>
  <circle cx="39" cy="28" r="5" fill="#fff"/>
  <circle cx="26" cy="29" r="3" fill="#111"/>
  <circle cx="40" cy="29" r="3" fill="#111"/>
  <!-- Eye shine -->
  <circle cx="27" cy="28" r="1" fill="#fff"/>
  <circle cx="41" cy="28" r="1" fill="#fff"/>
  <!-- Smile -->
  <path d="M26 40 Q32 46 38 40" stroke="#5a2d00" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Nostrils -->
  <circle cx="29" cy="38" r="1.5" fill="#5a2d00"/>
  <circle cx="35" cy="38" r="1.5" fill="#5a2d00"/>
  <!-- Gold crown -->
  <path d="M18 22 L22 12 L27 20 L32 10 L37 20 L42 12 L46 22 Z" fill="#FFD700" stroke="#FFA500" stroke-width="0.5"/>
  <rect x="18" y="20" width="28" height="5" rx="2" fill="#FFD700"/>
  <!-- Card suit - spade on chest -->
  <text x="32" y="52" text-anchor="middle" font-size="10" fill="#f0c060" font-weight="bold">♠</text>
</svg>
