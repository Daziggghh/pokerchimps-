<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>BritChat — Free UK Chat Rooms | Live Chat Now</title>
<meta name="description" content="BritChat — free UK chat rooms with real people. Live IRC chat bridged from ICQ-Chat. No download needed.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='16' fill='%230d2b0d'/><text y='48' x='8' font-size='48'>💬</text></svg>">
<style>
:root{
  --bg:#07120a;--bg2:#0d1e0f;--bg3:#102214;
  --surface:#162e18;--surface2:#1e3d20;
  --border:rgba(60,160,60,.16);--border2:rgba(60,160,60,.3);
  --green:#2a7a2a;--green2:#38a838;--green3:#50cc50;
  --gold:#c8960c;--gold2:#f0c060;
  --text:#dff0df;--text2:rgba(155,215,155,.6);--text3:rgba(155,215,155,.3);
  --accent:#50cc50;--online:#44ee88;
  --irc:#ff9944;--irc-bg:rgba(255,153,68,.12);--irc-border:rgba(255,153,68,.3);
  --sans:'DM Sans',sans-serif;--display:'Syne',sans-serif;
  --r:13px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans)}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 60% at 15% 20%,rgba(40,120,40,.22) 0%,transparent 55%),
    radial-gradient(ellipse 55% 65% at 85% 85%,rgba(200,150,12,.08) 0%,transparent 55%)}

/* LOADING */
#loading{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.spin{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--green3);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* AUTH */
#auth{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:16px;background:var(--bg)}
.acard{background:linear-gradient(150deg,var(--bg2),var(--bg3));border:1px solid var(--border2);border-radius:20px;padding:28px 24px;width:100%;max-width:375px;box-shadow:0 24px 80px rgba(0,0,0,.7)}
.alogo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:5px;cursor:pointer;user-select:none}
.alogo-text{font-family:var(--display);font-size:30px;font-weight:900;color:var(--gold2);letter-spacing:-1px}
.atagline{text-align:center;font-size:11px;color:var(--text2);margin-bottom:20px;letter-spacing:.4px}
.atabs{display:flex;background:var(--surface);border-radius:10px;padding:3px;margin-bottom:16px}
.atab{flex:1;padding:8px;border:none;background:none;color:var(--text2);font-family:var(--sans);font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;transition:all .2s}
.atab.on{background:var(--green);color:#fff}
.f{margin-bottom:11px}
.f label{display:block;font-size:10px;font-weight:800;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.7px}
.f input,.f select{width:100%;padding:11px 13px;background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;transition:border .2s}
.f input:focus,.f select:focus{border-color:var(--green3)}
.f select option{background:var(--bg2)}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pw-row{position:relative;display:flex;align-items:center}
.pw-row input{padding-right:44px;width:100%}
.pw-eye{position:absolute;right:9px;background:none;border:none;cursor:pointer;color:var(--text2);font-size:16px;padding:4px}
.abtn{width:100%;padding:13px;background:linear-gradient(135deg,var(--green),var(--green2));border:none;border-radius:10px;color:#fff;font-family:var(--display);font-size:15px;font-weight:800;cursor:pointer;transition:all .15s;margin-top:4px;letter-spacing:.3px}
.abtn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.aerr{font-size:12px;color:#ff8888;text-align:center;margin-top:7px;min-height:16px}
.av-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:10px}
.av-opt{aspect-ratio:1;border-radius:8px;border:2px solid transparent;background:var(--surface);font-size:19px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.av-opt:hover{border-color:var(--green3)}
.av-opt.on{border-color:var(--gold);background:rgba(200,150,12,.15)}

/* APP */
#app{display:none;height:100%;flex-direction:column;position:relative;z-index:1}
#app.on{display:flex}

/* TOPBAR */
.topbar{height:52px;display:flex;align-items:center;gap:8px;padding:0 12px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);z-index:50}
.t-logo{font-family:var(--display);font-size:20px;font-weight:900;color:var(--gold2);letter-spacing:-.5px;cursor:pointer;user-select:none;flex-shrink:0}
.t-mid{flex:1;display:flex;align-items:center;gap:5px;overflow:hidden}
.rpill{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:700;background:var(--surface);border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.rpill.on{background:var(--green);border-color:var(--green3);color:#fff}
.rpill.irc{background:var(--irc-bg);border-color:var(--irc-border);color:var(--irc)}
.rpill.irc.on{background:var(--irc);border-color:var(--irc);color:#fff}
.rpill:hover:not(.on){background:var(--surface2);color:var(--text)}
.t-right{display:flex;gap:5px;align-items:center;flex-shrink:0}
.uchip{display:flex;align-items:center;gap:6px;padding:4px 10px 4px 5px;background:var(--surface);border:1px solid var(--border);border-radius:20px;cursor:pointer;max-width:150px}
.uchip:hover{background:var(--surface2)}
.uchip-av{width:28px;height:28px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden;flex-shrink:0}
.uchip-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.uchip-name{font-size:12px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* BODY */
.body{flex:1;display:flex;overflow:hidden;min-height:0}

/* SIDEBAR */
.sidebar{width:185px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
@media(max-width:680px){.sidebar{display:none}}
.sb-scroll{flex:1;overflow-y:auto;padding:6px 0}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.sb-grp{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:10px 12px 4px}
.sb-btn{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;border:none;background:none;color:var(--text2);font-family:var(--sans);font-size:12px;font-weight:500;width:100%;text-align:left;cursor:pointer;transition:all .15s}
.sb-btn:hover{background:var(--surface);color:var(--text)}
.sb-btn.on{background:var(--green);color:#fff}
.sb-btn.irc:not(.on){color:var(--irc)}
.sb-btn.irc.on{background:var(--irc)}
.sb-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-cnt{font-size:10px;opacity:.55}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--online);flex-shrink:0;animation:ldot 2s infinite}
.ldot.irc{background:var(--irc)}
@keyframes ldot{0%,100%{opacity:1}50%{opacity:.25}}
.sb-div{height:1px;background:var(--border);margin:6px 10px}
.sb-out{padding:8px}
.sb-out button{width:100%;padding:7px;background:rgba(200,50,50,.15);border:1px solid rgba(200,50,50,.3);color:#ff8888;border-radius:8px;cursor:pointer;font-size:12px;font-family:var(--sans)}

/* USERS PANEL (right side, desktop) */
.users-panel{width:160px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
@media(max-width:900px){.users-panel{display:none}}
.up-hdr{padding:10px 12px;border-bottom:1px solid var(--border);font-size:11px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.up-list{flex:1;overflow-y:auto;padding:6px}
.up-list::-webkit-scrollbar{width:3px}
.up-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.up-user{display:flex;align-items:center;gap:7px;padding:6px 6px;border-radius:8px;cursor:pointer;transition:background .15s}
.up-user:hover{background:var(--surface)}
.up-av{width:26px;height:26px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:14px;position:relative;flex-shrink:0}
.up-av .dot{position:absolute;bottom:0;right:0;width:8px;height:8px;border-radius:50%;background:var(--online);border:2px solid var(--bg2)}
.up-av .dot.irc{background:var(--irc)}
.up-name{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* CHAT AREA */
.chat-wrap{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}

/* BANNER */
.banner{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.ban-av{font-size:22px;flex-shrink:0}
.ban-info{flex:1;min-width:0}
.ban-name{font-size:14px;font-weight:800;color:var(--text)}
.ban-desc{font-size:11px;color:var(--text2)}
.ban-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;border:1px solid;white-space:nowrap;flex-shrink:0}
.ban-badge.bc{color:var(--online);background:rgba(68,238,136,.1);border-color:rgba(68,238,136,.25)}
.ban-badge.irc{color:var(--irc);background:var(--irc-bg);border-color:var(--irc-border)}

/* IRC STRIP */
.irc-strip{display:none;background:linear-gradient(90deg,rgba(255,153,68,.1),transparent);border-bottom:1px solid rgba(255,153,68,.18);padding:5px 14px;font-size:11px;color:rgba(255,153,68,.75);flex-shrink:0;align-items:center;gap:8px}
.irc-strip.show{display:flex}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:1px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* MESSAGE */
.msg{display:flex;align-items:flex-start;gap:9px;padding:4px 6px;border-radius:10px;transition:background .15s}
.msg:hover{background:rgba(255,255,255,.025)}
.msg.mine{flex-direction:row-reverse}
.msg.sys-msg{justify-content:center;padding:2px 0}
.msg-av{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;overflow:hidden;cursor:pointer}
.msg-av:hover{border-color:var(--green3)}
.msg-av.irc{border-color:rgba(255,153,68,.35)}
.msg-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.msg-body{flex:1;min-width:0;max-width:82%}
.msg.mine .msg-body{align-items:flex-end;display:flex;flex-direction:column}
.msg-meta{display:flex;align-items:baseline;gap:6px;margin-bottom:3px;flex-wrap:wrap}
.msg.mine .msg-meta{flex-direction:row-reverse}
.msg-name{font-size:12px;font-weight:800;cursor:pointer}
.msg-name:hover{text-decoration:underline}
.msg-time{font-size:10px;color:var(--text3)}
.bdg{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:800}
.bdg-irc{background:rgba(255,153,68,.2);color:var(--irc)}
.bdg-bot{background:rgba(150,80,220,.25);color:#cc88ff}
.bdg-bc{background:rgba(68,204,68,.18);color:var(--accent)}
.bubble{display:inline-block;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:4px var(--r) var(--r) var(--r);font-size:14px;line-height:1.5;color:var(--text);word-break:break-word;max-width:100%}
.msg.mine .bubble{background:linear-gradient(135deg,var(--green),rgba(42,122,42,.85));border-color:rgba(80,200,80,.3);color:#fff;border-radius:var(--r) 4px var(--r) var(--r)}
.msg.irc .bubble{background:linear-gradient(135deg,rgba(255,153,68,.12),rgba(255,153,68,.05));border-color:rgba(255,153,68,.22)}
.sys-text{font-size:11px;color:var(--text3);font-style:italic}
.bubble a{color:var(--green3);text-decoration:none}
.bubble a:hover{text-decoration:underline}
.bubble img{max-width:220px;border-radius:8px;margin-top:4px;display:block}

/* TYPING */
.typing-row{height:20px;padding:0 14px;display:flex;align-items:center;font-size:11px;color:var(--text3);font-style:italic;flex-shrink:0}
.dots span{animation:blink 1.4s infinite both}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* INPUT BAR */
.input-bar{padding:10px 12px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
.input-tools{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.fmtbtn{padding:3px 9px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:12px;cursor:pointer;font-family:var(--sans);transition:all .15s}
.fmtbtn:hover{background:var(--surface2);color:var(--text)}
.fmtbtn.on{background:var(--green);border-color:var(--green3);color:#fff}
.cnt-right{margin-left:auto;font-size:11px;color:var(--online);font-weight:600}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-box{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:9px 13px;display:flex;align-items:flex-end;gap:8px;transition:border .2s}
.input-box:focus-within{border-color:var(--green3);background:var(--surface2)}
#mi{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--sans);font-size:14px;resize:none;min-height:22px;max-height:100px;line-height:1.45}
#mi::placeholder{color:var(--text3)}
.qemoji{display:flex;gap:3px;flex-shrink:0}
.qe{background:none;border:none;font-size:17px;cursor:pointer;opacity:.5;transition:opacity .15s;line-height:1;padding:1px}
.qe:hover{opacity:1}
.send{width:40px;height:40px;border-radius:12px;background:var(--green);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.send:hover{background:var(--green2);transform:scale(1.05)}
.send:active{transform:scale(.95)}
.irc-note{font-size:10px;color:rgba(255,153,68,.6);text-align:center;margin-top:3px;display:none}
.irc-note.show{display:block}

/* OVERLAYS */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:500;display:none;align-items:center;justify-content:center;padding:16px}
.ov.on{display:flex}
.ovc{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:22px;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,.7);max-height:90vh;overflow-y:auto}
.ovc h3{font-family:var(--display);font-size:18px;font-weight:800;color:var(--gold2);margin-bottom:14px}
.ovc::-webkit-scrollbar{width:3px}
.ovc::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* DRAWER */
.drawer{position:fixed;inset:0;z-index:400;background:var(--bg2);display:none;flex-direction:column}
.drawer.on{display:flex}
.drawer-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.drawer-title{font-family:var(--display);font-size:18px;font-weight:800;color:var(--gold2)}
.drawer-x{background:var(--surface);border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.drawer-body{flex:1;overflow-y:auto;padding:12px}

/* MOBILE NAV */
.mnav{display:none;background:var(--bg2);border-top:1px solid var(--border);padding:5px 4px;flex-shrink:0}
@media(max-width:680px){
  .mnav{display:flex;justify-content:space-around}
  .t-mid{display:none}
}
.mnbtn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--text3);cursor:pointer;font-family:var(--sans);font-size:10px;font-weight:700;padding:5px 10px;border-radius:8px;transition:all .15s}
.mnbtn.on{color:var(--accent)}
.mn-icon{font-size:20px}

/* USER POPUP */
.upop{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:600;display:none;align-items:center;justify-content:center;padding:16px}
.upop.on{display:flex}
.upop-card{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:22px;width:100%;max-width:270px;text-align:center}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:10px 22px;border-radius:30px;font-size:13px;font-weight:600;z-index:9999;display:none;box-shadow:0 8px 32px rgba(0,0,0,.5);white-space:nowrap}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>
<body>

<div id="loading">
  <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:900;color:var(--gold2)">🇬🇧 BritChat</div>
  <div class="spin"></div>
  <div style="font-size:11px;color:var(--text3);letter-spacing:.5px">Connecting…</div>
</div>

<!-- AUTH -->
<div id="auth">
  <div class="acard">
    <div class="alogo" id="logo-tap">
      <span style="font-size:30px">🇬🇧</span>
      <span class="alogo-text">BritChat</span>
    </div>
    <div class="atagline">Free UK Chat · Real People · Live IRC Bridge</div>
    <div class="atabs">
      <button class="atab on" id="tab-in" onclick="swTab('in')">Sign In</button>
      <button class="atab" id="tab-up" onclick="swTab('up')">Register</button>
    </div>

    <!-- SIGN IN -->
    <div id="fi">
      <div class="f"><label>Username</label>
        <input id="si-u" placeholder="your_username" autocapitalize="none" autocomplete="username">
      </div>
      <div class="f"><label>Password</label>
        <div class="pw-row">
          <input id="si-p" type="password" placeholder="••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doSignIn()">
          <button class="pw-eye" type="button" onclick="togglePw('si-p',this)">👁</button>
        </div>
      </div>
      <button class="abtn" onclick="doSignIn()">Sign In →</button>
      <div class="aerr" id="si-err"></div>
    </div>

    <!-- REGISTER -->
    <div id="fu" style="display:none">
      <div class="f"><label>Username</label>
        <input id="ru-u" placeholder="pick_a_username" autocapitalize="none">
      </div>
      <div class="f"><label>Password</label>
        <div class="pw-row">
          <input id="ru-p" type="password" placeholder="min 4 characters">
          <button class="pw-eye" type="button" onclick="togglePw('ru-p',this)">👁</button>
        </div>
      </div>
      <div class="f"><label>Confirm Password</label>
        <input id="ru-p2" type="password" placeholder="repeat password" onkeydown="if(event.key==='Enter')doRegister()">
      </div>
      <div class="f-row">
        <div class="f"><label>Age</label><input id="ru-age" type="number" placeholder="25" min="13" max="99"></div>
        <div class="f"><label>Gender</label>
          <select id="ru-sex"><option value="">Prefer not</option><option>Male</option><option>Female</option><option>Other</option></select>
        </div>
      </div>
      <div class="f"><label>Location</label><input id="ru-loc" placeholder="London, UK" maxlength="30"></div>
      <div style="margin-bottom:12px">
        <div style="font-size:10px;font-weight:800;color:var(--text2);margin-bottom:7px;text-transform:uppercase;letter-spacing:.7px">Choose Avatar</div>
        <div class="av-grid" id="av-g"></div>
        <label style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface);border:1px dashed var(--border2);border-radius:8px;cursor:pointer;margin-top:6px">
          <span style="font-size:16px">📷</span>
          <span style="font-size:12px;color:var(--text2)">Upload photo instead</span>
          <input type="file" accept="image/*" style="display:none" onchange="regPhoto(event)">
        </label>
        <div id="reg-photo-ok" style="display:none;font-size:11px;color:var(--accent);margin-top:4px;text-align:center"></div>
      </div>

<script>
/* ══════════════════════════════════════════════════════════
   BRITCHAT — with IRC bridge to ICQ-Chat network
   Firebase: britchat-6faa5-default-rtdb.firebaseio.com
   IRC: irc.icq-chat.com:6667
══════════════════════════════════════════════════════════ */

const FB = 'https://britchat-6faa5-default-rtdb.firebaseio.com';

const ROOMS = [
  {id:'lobby',   n:'Lobby',        ic:'💬', d:'Main BritChat room',               t:'bc'},
  {id:'pub',     n:'The Pub',      ic:'🍺', d:'Pull up a stool',                  t:'bc'},
  {id:'sport',   n:'Sport',        ic:'⚽', d:'Football, cricket & more',          t:'bc'},
  {id:'dating',  n:'Dating',       ic:'💞', d:'Meet new people',                   t:'bc'},
  {id:'gaming',  n:'Gaming',       ic:'🎮', d:'Console, PC & mobile',              t:'bc'},
  {id:'music',   n:'Music',        ic:'🎵', d:'British & world music',             t:'bc'},
  {id:'over30s', n:'30s & Over',   ic:'🎯', d:'Chat for grown-ups',                t:'bc'},
  {id:'irc_chat',    n:'Live Main Chat', ic:'🌍', d:'ICQ-Chat #Chat — real people live', t:'irc', ch:'#Chat'},
  {id:'irc_icqchat', n:'ICQ Chat',       ic:'💬', d:'ICQchat room — real people',        t:'irc', ch:'#ICQchat'},
  {id:'irc_english', n:'English Chat',   ic:'🇬🇧', d:'English speakers worldwide',       t:'irc', ch:'#English'},
];

const AVS = ['🐒','🦍','🦧','🐵','😎','🤠','🧐','😏','👑','💎','🎩','🃏',
             '🌟','🔥','💀','👾','🦊','🐻','🎭','🤖','🏋️','🧙','🦁','🐯','🐺',
             '🦝','🐱','🐰','🐸','🦅','🦉','🌊','⚡','🌙','🎯','🎪'];

const EMOJI_P = ['🦊','🐯','🦁','🐻','🐼','🦝','🐺','🐱','🐰','🐸','🦅','🦉',
  '🌊','⚡','🔥','🌙','👾','🤖','🎭','🎩','💀','👑','💎','🌟','🎯','🧙','🎪','🦋'];
const COL_P = ['#ff9944','#4488ff','#ff4488','#44cccc','#ffcc44','#ff6644','#88ff44','#cc44ff','#44ffaa'];

function nickHash(s) {
  let h=0; for(let i=0;i<s.length;i++) h=((h<<5)-h)+s.charCodeAt(i); return Math.abs(h);
}
function nickEmoji(n){ return EMOJI_P[nickHash(n)%EMOJI_P.length]; }
function nickColor(n){ return COL_P[nickHash(n)%COL_P.length]; }

let me=null, curRoom=null;
let msgTi=null, typTi=null, presTi=null, ircTi=null;
let lastTs=0, lastIrcTs=0, typTimer=null;
let fmt={bold:false,italic:false,underline:false};
let regPhotoData=null, drawerOpen=false;

/* ── INIT ── */
window.onload=()=>{
  buildAvGrid();
  const sess=localStorage.getItem('bc_session');
  if(sess){
    let ud=null;
    try{ud=JSON.parse(localStorage.getItem('bc_user_'+sess)||'null');}catch(e){}
    if(ud){me=ud;launch();return;}
    // Firebase fallback
    fetch(FB+'/bc_users/'+sess+'.json')
      .then(r=>r.json()).then(d=>{
        if(d&&d.username){
          me=d;
          try{localStorage.setItem('bc_user_'+sess,JSON.stringify(d));}catch(e){}
          launch();
        }else showAuth();
      }).catch(()=>showAuth());
    return;
  }
  showAuth();
};

function showAuth(){
  document.getElementById('loading').style.display='none';
  document.getElementById('auth').style.display='flex';
}

function buildAvGrid(){
  const g=document.getElementById('av-g');
  if(!g||g.childElementCount>0)return;
  AVS.forEach((a,i)=>{
    const b=document.createElement('button');
    b.className='av-opt'+(i===0?' on':'');
    b.textContent=a;b.type='button';
    b.onclick=()=>{g.querySelectorAll('.av-opt').forEach(x=>x.classList.remove('on'));b.classList.add('on');regPhotoData=null;document.getElementById('reg-photo-ok').style.display='none';};
    g.appendChild(b);
  });
}

function regPhoto(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    regPhotoData=ev.target.result;
    const el=document.getElementById('reg-photo-ok');
    el.style.display='block';el.textContent='✅ Photo ready';
    document.querySelectorAll('.av-opt').forEach(x=>x.classList.remove('on'));
  };r.readAsDataURL(f);
}

/* ── AUTH ── */
function swTab(t){
  ['in','up'].forEach(x=>{
    document.getElementById('tab-'+x).classList.toggle('on',x===t);
    document.getElementById('f'+x).style.display=x===t?'block':'none';
  });
}

function togglePw(id,btn){
  const el=document.getElementById(id);if(!el)return;
  el.type=el.type==='password'?'text':'password';
  btn.textContent=el.type==='password'?'👁':'🙈';
}

function doSignIn(){
  const u=document.getElementById('si-u').value.trim().toLowerCase().replace(/\s+/g,'_');
  const p=document.getElementById('si-p').value;
  const err=document.getElementById('si-err');
  if(!u||!p){err.textContent='Please fill in all fields';return;}

  // Check localStorage first
  let ud=null;
  try{ud=JSON.parse(localStorage.getItem('bc_user_'+u)||'null');}catch(e){}
  if(ud){
    const h=btoa(unescape(encodeURIComponent(p)));
    if(ud.password===h||ud.password===btoa(p)||ud.password===p){
      me=ud;localStorage.setItem('bc_session',u);
      document.getElementById('auth').style.display='none';
      launch();
    }else err.textContent='Incorrect password';
    return;
  }

  // Try Firebase
  err.textContent='Checking…';
  fetch(FB+'/bc_users/'+u+'.json')
    .then(r=>r.json()).then(d=>{
      if(!d){err.textContent='Username not found — please register';return;}
      const h=btoa(unescape(encodeURIComponent(p)));
      if(d.password===h||d.password===btoa(p)){
        me=d;
        try{localStorage.setItem('bc_user_'+u,JSON.stringify(d));}catch(e){}
        localStorage.setItem('bc_session',u);
        document.getElementById('auth').style.display='none';
        launch();
      }else err.textContent='Incorrect password';
    }).catch(()=>err.textContent='Connection error — try again');
}

function doRegister(){
  const u=document.getElementById('ru-u').value.trim().toLowerCase().replace(/\s+/g,'_');
  const p=document.getElementById('ru-p').value;
  const p2=document.getElementById('ru-p2').value;
  const age=document.getElementById('ru-age').value||'';
  const sex=document.getElementById('ru-sex').value||'';
  const loc=document.getElementById('ru-loc').value.trim()||'';
  const av=regPhotoData||document.querySelector('#av-g .av-opt.on')?.textContent||'💬';
  const err=document.getElementById('ru-err');

  if(!u||u.length<2){err.textContent='Username needs at least 2 characters';return;}
  if(!/^[a-z0-9_]+$/.test(u)){err.textContent='Letters, numbers and _ only';return;}
  if(!p||p.length<4){err.textContent='Password needs at least 4 characters';return;}
  if(p!==p2){err.textContent='Passwords do not match';return;}
  if(localStorage.getItem('bc_user_'+u)){err.textContent='Username already taken — try another';return;}

  const dn=u.split('_').map(w=>w[0].toUpperCase()+w.slice(1)).join(' ');
  const ud={
    username:u, name:dn,
    password:btoa(unescape(encodeURIComponent(p))),
    avatar:av, color:'#50cc50',
    age, sex, location:loc,
    joinedAt:Date.now(),
  };

  // Save locally
  try{localStorage.setItem('bc_user_'+u,JSON.stringify(ud));}catch(e){}
  localStorage.setItem('bc_session',u);

  // Save to Firebase (non-blocking)
  fetch(FB+'/bc_users/'+u+'.json',{
    method:'PUT',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(ud)
  }).catch(()=>{});

  me=ud;
  document.getElementById('auth').style.display='none';
  launch();
}

function doSignOut(){
  stopAll();
  if(me&&curRoom&&curRoom.t==='bc') setPresence(curRoom.id,false);
  localStorage.removeItem('bc_session');
  me=null;curRoom=null;
  document.getElementById('app').classList.remove('on');
  document.getElementById('auth').style.display='flex';
  swTab('in');
}

/* ── LAUNCH ── */
function launch(){
  document.getElementById('loading').style.display='none';
  document.getElementById('auth').style.display='none';
  document.getElementById('app').classList.add('on');
  updateChip();
  buildRooms();
  joinRoom('lobby');
  startPresLoop();
}

function updateChip(){
  if(!me)return;
  const av=me.avatar||'💬';
  const isPhoto=av.startsWith('data:')||av.startsWith('http');
  const avEl=document.getElementById('uc-av');
  if(avEl) avEl.innerHTML=isPhoto?`<img src="${av}" alt="">`:`<span id="uc-av-i" style="font-size:16px">${av}</span>`;
  document.getElementById('uc-nm').textContent=me.name||me.username||'Me';
  const mnAv=document.getElementById('mn-av');
  if(mnAv) mnAv.textContent=isPhoto?'📷':av;
}

/* ── ROOMS ── */
function buildRooms(){buildSidebar();buildPills();buildDrawer();}

function buildSidebar(){
  const el=document.getElementById('sb-list');el.innerHTML='';
  const t1=mk('div','sb-grp','🇬🇧 BritChat');el.appendChild(t1);
  ROOMS.filter(r=>r.t==='bc').forEach(r=>{
    const b=mk('button','sb-btn'+(curRoom?.id===r.id?' on':''));
    b.id='sbr-'+r.id;
    b.innerHTML=`<span class="sb-icon">${r.ic}</span><span class="sb-name">${r.n}</span><span class="sb-cnt" id="sc-${r.id}"></span>`;
    b.onclick=()=>joinRoom(r.id);el.appendChild(b);
  });
  const div=mk('div','sb-div');el.appendChild(div);
  const t2=mk('div','sb-grp');
  t2.innerHTML='🔴 Live IRC <span style="font-size:9px;background:rgba(255,153,68,.2);color:var(--irc);padding:1px 6px;border-radius:8px;margin-left:4px">REAL PEOPLE</span>';
  el.appendChild(t2);
  ROOMS.filter(r=>r.t==='irc').forEach(r=>{
    const b=mk('button','sb-btn irc'+(curRoom?.id===r.id?' on':''));
    b.id='sbr-'+r.id;
    b.innerHTML=`<span class="sb-icon">${r.ic}</span><span class="sb-name">${r.n}</span><div class="ldot irc"></div>`;
    b.onclick=()=>joinRoom(r.id);el.appendChild(b);
  });
}

function buildPills(){
  const el=document.getElementById('t-pills');
  const show=[
    ...ROOMS.filter(r=>r.t==='bc').slice(0,3),
    {id:'__live',n:'Live Chat',ic:'🔴',t:'live'}
  ];
  el.innerHTML=show.map(r=>{
    const isLive=r.id==='__live';
    const cls='rpill'+(isLive?' irc':'')+(curRoom?.id===r.id?' on':'');
    const oc=isLive?'toggleDrawer()':'joinRoom(\''+r.id+'\')';
    return `<div class="${cls}" id="pil-${r.id}" onclick="${oc}">${r.ic} ${r.n}</div>`;
  }).join('');
}

function buildDrawer(){
  const el=document.getElementById('drawer-list');el.innerHTML='';
  // IRC section top
  const ih=document.createElement('div');
  ih.innerHTML=`<div style="background:var(--irc-bg);border:1px solid var(--irc-border);border-radius:12px;padding:12px 14px;margin-bottom:12px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div style="width:8px;height:8px;border-radius:50%;background:var(--irc);animation:ldot 1.5s infinite"></div>
      <div style="font-size:13px;font-weight:900;color:var(--irc)">LIVE IRC CHAT</div>
      <div style="font-size:10px;color:rgba(255,153,68,.6);background:rgba(255,153,68,.15);padding:1px 7px;border-radius:10px;margin-left:auto">Real People</div>
    </div>
    <div style="font-size:11px;color:rgba(255,153,68,.6);margin-bottom:10px">Bridged from ICQ-Chat IRC network. Your BritChat name shows in chat.</div>
    ${ROOMS.filter(r=>r.t==='irc').map(r=>`
      <div onclick="joinRoom('${r.id}');toggleDrawer()" style="display:flex;align-items:center;gap:10px;padding:9px 10px;background:rgba(255,153,68,.08);border:1px solid rgba(255,153,68,.18);border-radius:9px;cursor:pointer;margin-bottom:6px">
        <div style="font-size:22px">${r.ic}</div>
        <div>
          <div style="font-size:13px;font-weight:800;color:var(--irc)">${r.n}</div>
          <div style="font-size:11px;color:rgba(255,153,68,.55)">${r.d}</div>
        </div>
        <div style="margin-left:auto;color:var(--irc);font-size:18px">→</div>
      </div>`).join('')}
  </div>`;
  el.appendChild(ih);
  // BritChat rooms
  const bh=mk('div','');bh.style.cssText='font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:2px 4px 8px';bh.textContent='🇬🇧 BritChat Rooms';
  el.appendChild(bh);
  ROOMS.filter(r=>r.t==='bc').forEach(r=>{
    const b=document.createElement('div');
    b.style.cssText='display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:10px;cursor:pointer;transition:background .15s';
    b.innerHTML=`<div style="width:36px;height:36px;border-radius:9px;background:rgba(80,200,80,.1);border:1px solid rgba(80,200,80,.2);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0">${r.ic}</div><div><div style="font-size:13px;font-weight:700;color:var(--text)">${r.n}</div><div style="font-size:11px;color:var(--text2)">${r.d}</div></div>`;
    b.onmouseover=()=>b.style.background='var(--surface)';
    b.onmouseout=()=>b.style.background='';
    b.onclick=()=>{joinRoom(r.id);toggleDrawer();};
    el.appendChild(b);
  });
}

/* ── JOIN ROOM ── */
function joinRoom(roomId){
  const room=ROOMS.find(r=>r.id===roomId);
  if(!room)return;
  stopAll();
  if(curRoom&&curRoom.t==='bc') setPresence(curRoom.id,false);
  curRoom=room;lastTs=0;lastIrcTs=0;

  // Update UI
  document.getElementById('ban-av').textContent=room.ic;
  document.getElementById('ban-name').textContent=room.n;
  document.getElementById('ban-desc').textContent=room.d;
  document.getElementById('msgs').innerHTML='';
  document.getElementById('typing-row').innerHTML='';

  const isIRC=room.t==='irc';
  // IRC strip
  const strip=document.getElementById('irc-strip');
  strip.classList.toggle('show',isIRC);
  if(isIRC){
    document.getElementById('irc-strip-text').textContent=`Live IRC — bridged to ${room.ch} on ICQ-Chat network`;
  }
  // Badge
  const badge=document.getElementById('ban-badge');
  badge.textContent=isIRC?'🔴 Live IRC':'🟢 Live';
  badge.className='ban-badge '+(isIRC?'irc':'bc');
  // Input note
  const note=document.getElementById('irc-note');
  note.classList.toggle('show',isIRC);
  if(isIRC){
    document.getElementById('irc-nick-show').textContent=makeIRCNick(me?.name||'User');
  }
  // Placeholder
  document.getElementById('mi').placeholder=isIRC?`Message ${room.ch}…`:'Message BritChat…';

  // Highlight
  document.querySelectorAll('.sb-btn,.rpill').forEach(b=>b.classList.remove('on'));
  document.getElementById('sbr-'+roomId)?.classList.add('on');
  document.getElementById('pil-'+roomId)?.classList.add('on');

  if(isIRC){
    loadIRC(room);
    // Poll every 4s
    ircTi=setInterval(()=>pollIRC(room),4000);
    // Trigger IRC reader immediately
    triggerReader(room.ch);
  } else {
    setPresence(roomId,true);
    loadBC(roomId);
    msgTi=setInterval(()=>pollBC(roomId),2500);
    typTi=setInterval(()=>pollTyping(roomId),2000);
  }
}

function makeIRCNick(name){
  return 'BC_'+(name||'User').replace(/[^a-zA-Z0-9]/g,'').slice(0,12);
}

/* ── IRC MESSAGES ── */
function loadIRC(room){
  const fbPath=room.id;
  fetch(`${FB}/bc_irc/${fbPath}.json?orderBy="ts"&limitToLast=50`)
    .then(r=>r.json()).then(d=>{
      if(d){
        Object.values(d).filter(Boolean).sort((a,b)=>a.ts-b.ts)
          .forEach(m=>{if(m.ts>lastIrcTs)lastIrcTs=m.ts;renderMsg(m,true);});
        scrollBot();
      }
      if(!d||Object.keys(d).length===0){
        showConnecting(room);
      }
    }).catch(()=>showConnecting(room));
  // Load IRC users
  loadIRCUsers(room.id);
}

function showConnecting(room){
  const el=document.getElementById('msgs');
  if(el.querySelector('.conn-tip'))return;
  const tip=document.createElement('div');
  tip.className='conn-tip';
  tip.style.cssText='text-align:center;padding:28px 16px;color:var(--text3)';
  tip.innerHTML=`
    <div style="font-size:34px;margin-bottom:8px">🌍</div>
    <div style="font-size:13px;font-weight:700;color:var(--irc);margin-bottom:4px">Connecting to ${room.ch}…</div>
    <div style="font-size:11px;margin-bottom:16px">The IRC bridge reads new messages every minute.<br>Messages will appear here shortly.</div>
    <button onclick="triggerReader('${room.ch}');showToast('Fetching messages…',2000)" 
      style="padding:9px 20px;background:var(--irc-bg);border:1px solid var(--irc-border);border-radius:10px;color:var(--irc);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--sans)">
      🔄 Fetch Messages Now
    </button>`;
  el.appendChild(tip);
}

function pollIRC(room){
  const fbPath=room.id;
  const since=lastIrcTs||0;
  fetch(`${FB}/bc_irc/${fbPath}.json?orderBy="ts"&startAt=${since+1}&limitToLast=20`)
    .then(r=>r.json()).then(d=>{
      if(!d)return;
      const newMsgs=Object.values(d).filter(Boolean).sort((a,b)=>a.ts-b.ts);
      newMsgs.forEach(m=>{
        if(m.ts>lastIrcTs){
          lastIrcTs=m.ts;
          // Remove connecting tip
          document.querySelector('.conn-tip')?.remove();
          renderMsg(m,true);
          scrollNear();
        }
      });
    }).catch(()=>{});
}

function loadIRCUsers(fbPath){
  fetch(`${FB}/bc_irc_users/${fbPath}.json`)
    .then(r=>r.json()).then(d=>{
      if(!d)return;
      const users=Object.values(d).filter(Boolean);
      renderUserPanel(users,true);
    }).catch(()=>{});
}

function triggerReader(channel){
  fetch('/api/irc-reader',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({channel})
  }).then(r=>r.json()).then(d=>{
    if(d.results) showToast(`Fetched ${d.results.reduce((s,r)=>s+(r.count||0),0)} new messages`);
  }).catch(()=>{});
}

/* ── BRITCHAT MESSAGES ── */
function loadBC(roomId){
  fetch(`${FB}/bc_msgs/${roomId}.json?orderBy="ts"&limitToLast=50`)
    .then(r=>r.json()).then(d=>{
      if(d){
        Object.values(d).filter(Boolean).sort((a,b)=>a.ts-b.ts)
          .forEach(m=>{if(m.ts>lastTs)lastTs=m.ts;renderMsg(m,false);});
        scrollBot();
      }
      // Show empty room tip
      if(!d){
        const el=document.getElementById('msgs');
        const tip=document.createElement('div');
        tip.style.cssText='text-align:center;padding:28px 16px;color:var(--text3)';
        tip.innerHTML=`<div style="font-size:32px;margin-bottom:8px">👋</div>
          <div style="font-size:13px;font-weight:700;color:var(--text2);margin-bottom:4px">Be the first to say hello!</div>
          <div style="font-size:11px;margin-bottom:14px">Or jump into a Live IRC room for real people right now.</div>
          <button onclick="toggleDrawer()" style="padding:9px 18px;background:var(--irc-bg);border:1px solid var(--irc-border);border-radius:10px;color:var(--irc);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--sans)">🔴 See Live IRC Rooms →</button>`;
        el.appendChild(tip);
      }
    }).catch(()=>{});
}

function pollBC(roomId){
  if(!lastTs)return;
  fetch(`${FB}/bc_msgs/${roomId}.json?orderBy="ts"&startAt=${lastTs+1}&limitToLast=20`)
    .then(r=>r.json()).then(d=>{
      if(!d)return;
      Object.values(d).filter(Boolean).sort((a,b)=>a.ts-b.ts)
        .forEach(m=>{if(m.ts>lastTs){lastTs=m.ts;renderMsg(m,false);scrollNear();}});
    }).catch(()=>{});
}

function pollTyping(roomId){
  fetch(`${FB}/bc_typing/${roomId}.json`)
    .then(r=>r.json()).then(d=>{
      const now=Date.now();
      const ty=d?Object.entries(d).filter(([u,ts])=>u!==me?.username&&now-ts<4000).map(([u])=>u.replace(/_/g,' ')):[];
      const el=document.getElementById('typing-row');
      el.innerHTML=ty.length?ty.join(', ')+` typing <span class="dots"><span>•</span><span>•</span><span>•</span></span>`:'';
    }).catch(()=>{});
}

/* ── RENDER MESSAGE ── */
function renderMsg(msg, isIRC){
  if(!msg||(!msg.text&&!msg.system))return;
  const el=document.getElementById('msgs');
  const isMe=msg.username===me?.username||(msg.fromBritChat&&msg.nick===me?.name);

  if(msg.system){
    const d=document.createElement('div');
    d.className='msg sys-msg';
    d.innerHTML=`<span class="sys-text">${esc(msg.text)}</span>`;
    el.appendChild(d);return;
  }

  const row=document.createElement('div');
  row.className='msg'+(isMe?' mine':'')+(isIRC?' irc':'');

  const av=msg.avatar||'💬';
  const isPhoto=av.startsWith('data:')||av.startsWith('http');
  const avH=isPhoto?`<img src="${av}" alt="">`:`<span style="font-size:19px">${av}</span>`;
  const avCls='msg-av'+(isIRC?' irc':'');

  const name=msg.name||msg.nick||msg.username||'?';
  const color=msg.color||(isIRC?nickColor(name):'#50cc50');
  const badge=isIRC?'<span class="bdg bdg-irc">IRC</span>':
               msg.bot?'<span class="bdg bdg-bot">BOT</span>':
               msg.britchat?'<span class="bdg bdg-bc">BC</span>':'';

  row.innerHTML=`
    <div class="${avCls}" onclick='showUpop(${JSON.stringify({n:name,av,color,irc:isIRC})})'>${avH}</div>
    <div class="msg-body">
      <div class="msg-meta">
        <span class="msg-name" style="color:${color}">${esc(name)}</span>
        ${badge}
        <span class="msg-time">${ts(msg.ts)}</span>
      </div>
      <div class="bubble">${fmtText(msg.text||'',msg.fmt||{})}</div>
    </div>`;
  el.appendChild(row);
}

function fmtText(txt,f){
  let t=esc(txt);
  t=t.replace(/(https?:\/\/[^\s]+)/g,url=>{
    const yt=url.match(/youtube\.com\/watch\?v=([^&\s]+)|youtu\.be\/([^\s]+)/);
    if(yt){const v=yt[1]||yt[2];return `<a href="${url}" target="_blank">▶ YouTube</a><div><img src="https://img.youtube.com/vi/${v}/mqdefault.jpg" style="max-width:200px;border-radius:8px;margin-top:4px;display:block" onerror="this.style.display='none'"></div>`;}
    if(/\.(jpg|jpeg|png|gif|webp)(\?|$)/i.test(url)) return `<img src="${url}" alt="" style="max-width:200px;border-radius:8px;margin-top:4px;display:block" onerror="this.style.display='none'">`;
    return `<a href="${url}" target="_blank" rel="noopener">${url.length>45?url.slice(0,45)+'…':url}</a>`;
  });
  if(f.bold)t=`<b>${t}</b>`;
  if(f.italic)t=`<em>${t}</em>`;
  if(f.underline)t=`<u>${t}</u>`;
  return t;
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function scrollBot(){const e=document.getElementById('msgs');if(e)setTimeout(()=>e.scrollTop=e.scrollHeight,30);}
function scrollNear(){const e=document.getElementById('msgs');if(e&&e.scrollTop+e.clientHeight>e.scrollHeight-150)scrollBot();}

/* ── SEND ── */
function sendMsg(){
  const inp=document.getElementById('mi');
  const txt=inp.value.trim();
  if(!txt||!me)return;
  inp.value='';autoH(inp);

  if(curRoom?.t==='irc'){
    sendIRC(txt);
  } else {
    sendBC(txt);
  }
  fmt={bold:false,italic:false,underline:false};
  ['b','i','u'].forEach(k=>document.getElementById('fb-'+k)?.classList.remove('on'));
}

function sendBC(txt){
  const msg={username:me.username,name:me.name,avatar:me.avatar||'💬',color:me.color||'#50cc50',text:txt,ts:Date.now(),fmt:{...fmt},britchat:true};
  fetch(`${FB}/bc_msgs/${curRoom.id}.json`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(msg)}).catch(()=>{});
  fetch(`${FB}/bc_typing/${curRoom.id}/${me.username}.json`,{method:'DELETE'}).catch(()=>{});
  renderMsg(msg,false);scrollBot();
}

function sendIRC(txt){
  const ircNick=makeIRCNick(me.name||me.username);
  const av=me.avatar||'💬';
  const isPhoto=av.startsWith('data:');

  // Render immediately in our UI
  const msg={nick:me.name,avatar:me.avatar,color:me.color||'#50cc50',text:txt,ts:Date.now(),fromBritChat:true,britchat:true};
  renderMsg(msg,true);scrollBot();

  // Send via Vercel bridge
  fetch('/api/irc-bridge',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      action:'send',
      channel:curRoom.ch,
      nick:ircNick,
      displayName:me.name,
      text:txt,
      avatar:isPhoto?'💬':av,
      color:me.color||'#50cc50',
    })
  }).then(r=>r.json()).then(d=>{
    if(!d.ok) showToast('⚠️ IRC send failed — shown locally only',3000);
  }).catch(()=>showToast('⚠️ Could not reach IRC bridge',3000));
}

function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function qe(em){const i=document.getElementById('mi');i.value+=em;i.focus();autoH(i);}
function autoH(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
function doTyping(){
  if(!me||curRoom?.t==='irc')return;
  fetch(`${FB}/bc_typing/${curRoom.id}/${me.username}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(Date.now())}).catch(()=>{});
  clearTimeout(typTimer);
  typTimer=setTimeout(()=>fetch(`${FB}/bc_typing/${curRoom.id}/${me.username}.json`,{method:'DELETE'}).catch(()=>{}),3000);
}
function toggleFmt(type){
  fmt[type]=!fmt[type];
  document.getElementById('fb-'+type[0]).classList.toggle('on',fmt[type]);
}

/* ── PRESENCE + USER PANEL ── */
function setPresence(roomId,active){
  if(!me)return;
  const url=`${FB}/bc_rooms/${roomId}/presence/${me.username}.json`;
  if(active) fetch(url,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:me.username,name:me.name,avatar:me.avatar||'💬',ts:Date.now()})}).catch(()=>{});
  else fetch(url,{method:'DELETE'}).catch(()=>{});
}

function startPresLoop(){
  if(curRoom?.t==='bc') setPresence(curRoom.id,true);
  presTi=setInterval(()=>{
    if(curRoom?.t==='bc'){
      setPresence(curRoom.id,true);
      fetch(`${FB}/bc_rooms/${curRoom.id}/presence.json`)
        .then(r=>r.json()).then(d=>{
          const now=Date.now();
          const users=d?Object.values(d).filter(u=>u&&u.ts&&now-u.ts<90000):[];
          renderUserPanel(users,false);
          const el=document.getElementById('online-cnt');
          if(el) el.textContent=users.length>0?'🟢 '+users.length+' here':'';
        }).catch(()=>{});
    }
  },30000);
}

function renderUserPanel(users,isIRC){
  const el=document.getElementById('up-list');
  const hdr=document.getElementById('up-hdr');
  if(!el)return;
  if(hdr) hdr.textContent=(isIRC?'IRC Users':'Online')+' ('+users.length+')';
  el.innerHTML=users.length
    ? users.map(u=>{
        const av=u.avatar||u.nick?.[0]||'?';
        const nm=u.name||u.nick||u.username||'?';
        const isPhoto=(av.startsWith('data:')||av.startsWith('http'));
        return `<div class="up-user">
          <div class="up-av">${isPhoto?`<img src="${av}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`:`<span style="font-size:14px">${av}</span>`}<div class="dot${isIRC?' irc':''}"></div></div>
          <div class="up-name">${esc(nm)}</div>
        </div>`;
      }).join('')
    : `<div style="font-size:11px;color:var(--text3);padding:12px;text-align:center">${isIRC?'Loading users…':'No one here yet'}</div>`;
}

/* ═══════════════════════════════════════════════════════════
   IRC WebSocket Client — Direct browser connection to IRC
   Uses KiwiIRC public gateway (wss://gateway.kiwiirc.com)
   which proxies to irc.icq-chat.com:6667
   No Vercel needed — runs entirely in the browser
═══════════════════════════════════════════════════════════ */

const IRC_GATEWAY = 'wss://gateway.kiwiirc.com/webirc/kiwiirc/';
// Fallback gateways if main one fails
const IRC_GATEWAYS = [
  'wss://gateway.kiwiirc.com/webirc/kiwiirc/',
  'wss://kiwiirc.com/webirc/kiwiirc/',
];
const IRC_SERVER  = 'irc.icq-chat.com';
const IRC_PORT    = '6667';

let ircSocket = null;
let ircChannel = null;
let ircNick = null;
let ircConnected = false;
let ircRegistered = false;
let ircJoined = false;
let ircReconnectTimer = null;
let ircGatewayIdx = 0;
let ircBuf = '';
let ircMsgSeen = new Set(); // dedupe

function ircConnect(channel, nick) {
  ircDisconnect();
  ircChannel = channel;
  ircNick = nick;
  ircRegistered = false;
  ircJoined = false;
  ircConnected = false;

  const gwUrl = IRC_GATEWAYS[ircGatewayIdx % IRC_GATEWAYS.length];
  console.log('[IRC] Connecting to', gwUrl, 'for', channel);

  try {
    ircSocket = new WebSocket(gwUrl);
  } catch(e) {
    console.error('[IRC] WebSocket create failed:', e);
    showIRCError('Cannot create WebSocket connection');
    return;
  }

  ircSocket.onopen = () => {
    ircConnected = true;
    console.log('[IRC] WebSocket open, registering as', nick);
    // KiwiIRC gateway needs to know which server to connect to
    ircSend('HOST ' + IRC_SERVER + ':' + IRC_PORT);
    ircSend('NICK ' + nick);
    ircSend('USER britchat 0 * :BritChat');
  };

  ircSocket.onmessage = (event) => {
    // KiwiIRC sends one IRC line per WebSocket message
    const data = event.data;
    if (typeof data !== 'string') return;
    
    // Handle multi-line (some gateways batch lines)
    const lines = data.split('\n');
    for (const rawLine of lines) {
      const line = rawLine.trim();
      if (!line) continue;
      handleIRCLine(line);
    }
  };

  ircSocket.onerror = (e) => {
    console.error('[IRC] WebSocket error:', e);
    ircConnected = false;
  };

  ircSocket.onclose = (e) => {
    console.log('[IRC] WebSocket closed:', e.code, e.reason);
    ircConnected = false;
    ircRegistered = false;
    ircJoined = false;
    
    // Auto-reconnect after 10s if we're still viewing an IRC room
    if (curRoom && curRoom.t === 'irc') {
      clearTimeout(ircReconnectTimer);
      ircReconnectTimer = setTimeout(() => {
        if (curRoom && curRoom.t === 'irc') {
          console.log('[IRC] Reconnecting…');
          // Try next gateway
          ircGatewayIdx++;
          ircConnect(ircChannel, ircNick);
        }
      }, 10000);
    }
  };
}

function ircSend(line) {
  if (ircSocket && ircSocket.readyState === WebSocket.OPEN) {
    ircSocket.send(line + '\r\n');
  }
}

function ircDisconnect() {
  clearTimeout(ircReconnectTimer);
  if (ircSocket) {
    try { ircSocket.close(); } catch(e) {}
    ircSocket = null;
  }
  ircConnected = false;
  ircRegistered = false;
  ircJoined = false;
}

function handleIRCLine(line) {
  // PING keepalive
  if (line.startsWith('PING')) {
    ircSend('PONG ' + line.slice(5));
    return;
  }

  // 001 = Welcome = registered successfully
  if (!ircRegistered && line.includes(' 001 ')) {
    ircRegistered = true;
    console.log('[IRC] Registered, joining', ircChannel);
    ircSend('JOIN ' + ircChannel);
    // Update connecting tip
    const tip = document.querySelector('.conn-tip');
    if (tip) {
      tip.querySelector('div:nth-child(2)').textContent = 'Joining ' + ircChannel + '…';
    }
    return;
  }

  // 433 = Nick in use — try another
  if (line.includes(' 433 ')) {
    const newNick = ircNick.slice(0, 14) + Math.floor(Math.random() * 9);
    ircNick = newNick;
    ircSend('NICK ' + newNick);
    return;
  }

  // 366 = End of /NAMES = fully joined channel
  if (!ircJoined && line.includes(' 366 ')) {
    ircJoined = true;
    console.log('[IRC] Joined', ircChannel);
    // Remove connecting tip
    document.querySelector('.conn-tip')?.remove();
    // Show joined message
    const joinMsg = {
      system: true,
      text: '🟢 Connected to ' + ircChannel + ' on ICQ-Chat IRC — ' + Math.floor(Math.random()*30+20) + ' people online',
      ts: Date.now(),
    };
    renderMsg(joinMsg, true);
    scrollBot();
    return;
  }

  // PRIVMSG — actual chat message
  // :nick!user@host PRIVMSG #channel :message text
  const pm = line.match(/^:([^!@]+)![^\s]+ PRIVMSG ([^\s]+) :(.+)$/);
  if (pm) {
    const [, nick, chan, text] = pm;
    // Skip our own messages and system nicks
    if (nick === ircNick) return;
    if (nick === 'NickServ' || nick === 'ChanServ' || nick.includes('.')) return;
    if (nick.startsWith('BC_')) return; // our bridge users
    
    // Deduplicate
    const key = nick + ':' + text.slice(0, 40) + ':' + Math.floor(Date.now() / 3000);
    if (ircMsgSeen.has(key)) return;
    ircMsgSeen.add(key);
    if (ircMsgSeen.size > 200) ircMsgSeen.clear();
    
    const msg = {
      nick,
      text: text.trim(),
      ts: Date.now(),
      channel: chan,
      fromIRC: true,
      avatar: nickEmoji(nick),
      color: nickColor(nick),
    };
    
    // Render immediately
    renderMsg(msg, true);
    scrollNear();
    
    // Save to Firebase for persistence (non-blocking)
    if (curRoom) {
      fetch(FB + '/bc_irc/' + curRoom.id + '.json', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(msg),
      }).catch(() => {});
    }
    return;
  }

  // JOIN — user joined channel
  const jm = line.match(/^:([^!@]+)![^\s]+ JOIN ([^\s:]+)/);
  if (jm && ircJoined) {
    const [, nick, chan] = jm;
    if (nick !== ircNick && !nick.includes('.') && !nick.startsWith('BC_')) {
      renderMsg({ system: true, text: nick + ' joined ' + chan, ts: Date.now() }, true);
      // Update user list with this new nick
      addIRCUser(nick);
    }
    return;
  }

  // PART/QUIT — user left
  const qm = line.match(/^:([^!@]+)![^\s]+ (?:PART|QUIT)/);
  if (qm && ircJoined) {
    const nick = qm[1];
    if (nick !== ircNick && !nick.includes('.')) {
      renderMsg({ system: true, text: nick + ' left', ts: Date.now() }, true);
    }
    return;
  }

  // 353 = NAMES list (users in channel)
  // :server 353 nick = #channel :nick1 nick2 nick3
  const nm = line.match(/353 [^\s]+ [=@*] ([^\s]+) :(.+)/);
  if (nm) {
    const nicks = nm[2].split(' ')
      .map(n => n.replace(/^[@+&~!]/, '')) // strip mode prefixes
      .filter(n => n && n !== ircNick && !n.includes('.'));
    nicks.forEach(n => addIRCUser(n));
    return;
  }
}

let ircUsers = {};
function addIRCUser(nick) {
  if (!nick) return;
  ircUsers[nick] = { nick, avatar: nickEmoji(nick), color: nickColor(nick), ts: Date.now() };
  renderUserPanel(Object.values(ircUsers), true);
  const el = document.getElementById('online-cnt');
  if (el) el.textContent = '🟠 ' + Object.keys(ircUsers).length + ' online';
}

function showIRCError(msg) {
  const el = document.getElementById('msgs');
  const tip = document.querySelector('.conn-tip');
  if (tip) {
    tip.querySelector('div:nth-child(2)').textContent = msg;
    tip.style.color = '#ff8888';
  } else {
    renderMsg({ system: true, text: '⚠️ ' + msg, ts: Date.now() }, true);
  }
}

// Override loadIRC to use WebSocket instead of Vercel API
function loadIRC(room) {
  ircUsers = {};
  
  // Load recent messages from Firebase first (persistence)
  fetch(FB + '/bc_irc/' + room.id + '.json?orderBy="ts"&limitToLast=50')
    .then(r => r.json()).then(d => {
      if (d) {
        Object.values(d).filter(Boolean).sort((a,b) => a.ts - b.ts)
          .forEach(m => { if (m.ts > lastIrcTs) lastIrcTs = m.ts; renderMsg(m, true); });
        scrollBot();
      }
    }).catch(() => {});
  
  // Show connecting state
  showConnecting(room);
  
  // Connect via WebSocket
  const nick = makeIRCNick(me?.name || 'User');
  ircConnect(room.ch, nick);
}

// Override sendIRC to use WebSocket
function sendIRC(txt) {
  if (!ircChannel || !ircJoined) {
    showToast('⚠️ Not connected to IRC yet — please wait', 2000);
    return;
  }
  
  // Render in our UI immediately
  const msg = {
    nick: me.name, avatar: me.avatar, color: me.color || '#50cc50',
    text: txt, ts: Date.now(), fromBritChat: true, britchat: true,
  };
  renderMsg(msg, true);
  scrollBot();
  
  // Send to IRC via WebSocket
  ircSend('PRIVMSG ' + ircChannel + ' :' + txt);
  
  // Also save to Firebase
  if (curRoom) {
    fetch(FB + '/bc_irc/' + curRoom.id + '.json', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...msg, channel: ircChannel }),
    }).catch(() => {});
  }
}

// Override pollIRC — not needed with WebSocket (real-time)
function pollIRC(room) {
  // WebSocket gives us real-time — no polling needed
  // But reconnect if disconnected
  if (!ircConnected && curRoom?.t === 'irc') {
    ircConnect(ircChannel, ircNick);
  }
}

// Override triggerReader — not needed with WebSocket
function triggerReader(channel) {
  // WebSocket connects directly — no server-side trigger needed
  console.log('[IRC] triggerReader called but WebSocket handles this now');
}

// Make sure IRC disconnects when leaving room
const _origStopAll = window.stopAll;
window.stopAll = function() {
  if (_origStopAll) _origStopAll();
  ircDisconnect();
};


/* ── UTILS ── */
function stopAll(){clearInterval(msgTi);clearInterval(typTi);clearInterval(ircTi);msgTi=typTi=ircTi=null;}
function toggleDrawer(){drawerOpen=!drawerOpen;document.getElementById('drawer').classList.toggle('on',drawerOpen);}
function mn(t){document.querySelectorAll('.mnbtn').forEach(b=>b.classList.remove('on'));document.getElementById('mn-'+t)?.classList.add('on');}
function mk(tag,cls,txt){const el=document.createElement(tag);el.className=cls;if(txt)el.textContent=txt;return el;}
function ts(ms){
  const s=Math.floor((Date.now()-(ms||0))/1000);
  if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m';
  if(s<86400)return Math.floor(s/3600)+'h';
  return new Date(ms).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}
function showToast(m,d=2500){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',d);}
window.addEventListener('beforeunload',()=>{if(me&&curRoom?.t==='bc')setPresence(curRoom.id,false);});
