<style>
:root{
  --bg:#080f08;--bg2:#0d180d;--bg3:#122012;
  --surface:#162316;--surface2:#1c2e1c;
  --border:rgba(100,200,80,.15);--border2:rgba(100,200,80,.28);
  --green:#2d7a2d;--green2:#3aaa3a;
  --gold:#c8960c;--gold2:#f0c060;
  --text:#e8f5e8;--text2:rgba(200,240,200,.55);--text3:rgba(200,240,200,.28);
  --accent:#44cc44;--danger:#cc3333;--online:#44dd88;
  --sans:'DM Sans',sans-serif;--display:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans)}

body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 10% 20%,rgba(45,122,45,.2) 0%,transparent 60%),
    radial-gradient(ellipse 60% 80% at 90% 80%,rgba(200,150,12,.09) 0%,transparent 60%);
}

/* ══ LOADING ══ */
#loading{
  position:fixed;inset:0;z-index:999;background:var(--bg);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;
}
.spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--green2);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══ AUTH ══ */
#auth{
  position:fixed;inset:0;z-index:100;display:none;
  align-items:center;justify-content:center;padding:16px;
  background:var(--bg);
}
.auth-card{
  background:linear-gradient(145deg,var(--bg2),var(--bg3));
  border:1px solid var(--border2);border-radius:20px;
  padding:28px 22px;width:100%;max-width:370px;
  box-shadow:0 24px 80px rgba(0,0,0,.7);position:relative;z-index:1;
}
.auth-logo{
  font-family:var(--display);font-size:30px;font-weight:900;
  color:var(--gold2);text-align:center;margin-bottom:4px;
  letter-spacing:-.5px;cursor:pointer;user-select:none;
}
.auth-tagline{text-align:center;font-size:11px;color:var(--text2);margin-bottom:20px;letter-spacing:.5px}
.auth-tabs{display:flex;background:var(--surface);border-radius:10px;padding:3px;margin-bottom:18px}
.atab{flex:1;padding:8px;border:none;background:none;color:var(--text2);font-family:var(--sans);font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;transition:all .2s}
.atab.on{background:var(--green);color:#fff}
.field{margin-bottom:11px}
.field label{display:block;font-size:10px;font-weight:800;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.6px}
.field input,.field select{
  width:100%;padding:10px 12px;background:var(--surface);
  border:1px solid var(--border);border-radius:9px;
  color:var(--text);font-family:var(--sans);font-size:14px;outline:none;
  transition:border .2s;
}
.field input:focus,.field select:focus{border-color:var(--green2)}
.field select option{background:var(--bg2)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-go{
  width:100%;padding:13px;margin-top:2px;
  background:linear-gradient(135deg,var(--green),var(--green2));
  border:none;border-radius:10px;color:#fff;
  font-family:var(--display);font-size:16px;font-weight:800;
  cursor:pointer;letter-spacing:.3px;transition:all .15s;
}
.btn-go:hover{filter:brightness(1.1);transform:translateY(-1px)}
.err{font-size:12px;color:#ff8888;text-align:center;margin-top:7px;min-height:16px}
.poker-pill{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 14px;margin-top:12px;
  background:rgba(200,150,12,.1);border:1px solid rgba(200,150,12,.3);
  border-radius:10px;color:var(--gold2);font-size:13px;font-weight:600;
  text-decoration:none;transition:all .15s;
}
.poker-pill:hover{background:rgba(200,150,12,.2)}

/* ══ APP LAYOUT ══ */
#app{display:none;height:100%;flex-direction:column;position:relative;z-index:1}
#app.on{display:flex}

/* TOP BAR */
.topbar{
  height:50px;display:flex;align-items:center;gap:8px;
  padding:0 12px;flex-shrink:0;
  background:var(--bg2);border-bottom:1px solid var(--border);
  position:relative;z-index:10;
}
.topbar-logo{font-family:var(--display);font-size:20px;font-weight:900;color:var(--gold2);letter-spacing:-.5px;cursor:pointer;user-select:none;flex-shrink:0}
.topbar-center{flex:1;display:flex;align-items:center;justify-content:center;gap:8px}
.room-pill{
  padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;
  background:var(--surface);border:1px solid var(--border);color:var(--text2);
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.room-pill.active{background:var(--green);border-color:var(--green2);color:#fff}
.room-pill:hover:not(.active){background:var(--surface2);color:var(--text)}
.topbar-right{display:flex;gap:6px;align-items:center;flex-shrink:0}
.icon-btn{
  width:34px;height:34px;border-radius:9px;border:1px solid var(--border);
  background:var(--surface);color:var(--text2);font-size:16px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;flex-shrink:0;position:relative;
}
.icon-btn:hover{background:var(--surface2);color:var(--text)}
.user-chip{
  display:flex;align-items:center;gap:6px;
  padding:4px 10px 4px 5px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;cursor:pointer;transition:all .15s;
}
.user-chip:hover{background:var(--surface2)}
.user-chip-av{font-size:18px;line-height:1}
.user-chip-name{font-size:12px;font-weight:700;color:var(--text);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* BODY */
.app-body{flex:1;display:flex;overflow:hidden;min-height:0}

/* SIDEBAR */
.sidebar{
  width:180px;flex-shrink:0;
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
@media(max-width:680px){.sidebar{display:none}}

.sb-section{padding:10px 8px 0}
.sb-title{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:6px 8px 4px}
.sb-room{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;border-radius:9px;
  border:none;background:none;color:var(--text2);
  font-family:var(--sans);font-size:13px;font-weight:500;
  width:100%;text-align:left;cursor:pointer;transition:all .15s;
}
.sb-room:hover{background:var(--surface);color:var(--text)}
.sb-room.active{background:var(--green);color:#fff}
.sb-room-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.sb-room-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.sb-divider{height:1px;background:var(--border);margin:8px 10px}

/* Poker link in sidebar */
.sb-poker{
  margin:8px;border-radius:10px;
  background:linear-gradient(135deg,rgba(200,150,12,.18),rgba(200,150,12,.06));
  border:1px solid rgba(200,150,12,.3);
}
.sb-poker a{
  display:flex;align-items:center;gap:8px;padding:10px 12px;
  color:var(--gold2);font-size:12px;font-weight:700;text-decoration:none;
}
.sb-signout{
  padding:8px;
}
.sb-signout button{
  width:100%;padding:7px;background:rgba(200,50,50,.15);
  border:1px solid rgba(200,50,50,.3);color:#ff8888;
  border-radius:8px;cursor:pointer;font-size:12px;font-family:var(--sans);
}

/* CHAT FRAME AREA */
.chat-wrap{
  flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;
  position:relative;
}
.chat-banner{
  padding:8px 14px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.chat-banner-icon{font-size:20px}
.chat-banner-info{flex:1;min-width:0}
.chat-banner-name{font-size:14px;font-weight:800;color:var(--text)}
.chat-banner-desc{font-size:11px;color:var(--text2)}
.chat-banner-badge{
  font-size:11px;color:var(--online);font-weight:700;
  background:rgba(68,221,136,.1);border:1px solid rgba(68,221,136,.25);
  padding:3px 9px;border-radius:20px;flex-shrink:0;
}

/* THE ADDACHAT IFRAME */
#addachat-frame{
  flex:1;border:none;width:100%;min-height:0;
  display:block;
}

/* PROFILE OVERLAY */
.ov{
  position:fixed;inset:0;background:rgba(0,0,0,.82);
  z-index:500;display:none;align-items:center;justify-content:center;padding:16px;
}
.ov.on{display:flex}
.ov-card{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:18px;padding:22px;width:100%;max-width:340px;
  box-shadow:0 20px 60px rgba(0,0,0,.7);
  max-height:90vh;overflow-y:auto;
}
.ov-card h3{font-family:var(--display);font-size:18px;font-weight:800;color:var(--gold2);margin-bottom:14px}

/* MOBILE ROOMS DRAWER */
.rooms-drawer{
  position:fixed;inset:0;z-index:400;
  background:var(--bg2);display:none;flex-direction:column;
}
.rooms-drawer.on{display:flex}
.drawer-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.drawer-hdr-title{font-family:var(--display);font-size:18px;font-weight:800;color:var(--gold2)}
.drawer-close{background:var(--surface);border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.drawer-body{flex:1;overflow-y:auto;padding:10px}

/* TOAST */
#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--text);padding:10px 22px;border-radius:30px;
  font-size:13px;font-weight:600;z-index:9999;display:none;
  box-shadow:0 8px 32px rgba(0,0,0,.5);white-space:nowrap;
}

/* MOBILE NAV */
.mobile-nav{
  display:none;background:var(--bg2);border-top:1px solid var(--border);
  padding:6px 8px;flex-shrink:0;
}
@media(max-width:680px){
  .mobile-nav{display:flex;justify-content:space-around}
  .topbar-center{display:none}
}
.mnav-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:none;border:none;color:var(--text3);cursor:pointer;
  font-family:var(--sans);font-size:10px;font-weight:700;
  padding:5px 14px;border-radius:8px;transition:all .15s;
}
.mnav-btn.active{color:var(--accent)}
.mnav-icon{font-size:20px}

/* Avatar grid */
.av-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:12px}
.av-opt{aspect-ratio:1;border-radius:9px;border:2px solid transparent;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;transition:all .15s}
.av-opt:hover{border-color:var(--green2)}
.av-opt.sel{border-color:var(--gold);background:rgba(200,150,12,.15)}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:900;color:var(--gold2)">🐒 BritChat</div>

  <div style="font-size:12px;color:var(--text3)">Loading your chat…</div>
</div>

<!-- AUTH -->
<div id="auth">

    <div class="auth-tabs">
      <button class="atab on" id="tab-in" onclick="switchTab('in')">Sign In</button>
      <button class="atab" id="tab-up" onclick="switchTab('up')">Register</button>
    </div>

    <!-- SIGN IN -->
    <div id="form-in">
      <div class="field"><label>Username</label>
        <input id="si-u" placeholder="your_username" autocapitalize="none" autocomplete="username">
      </div>
      <div class="field"><label>Password</label>
        <input id="si-p" type="password" placeholder="••••••" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')doSignIn()">
      </div>
      <button class="btn-go" onclick="doSignIn()">Sign In →</button>
      <div class="err" id="si-err"></div>
    </div>

    <!-- REGISTER -->
    <div id="form-up" style="display:none">
      <div class="field"><label>Username</label>
        <input id="ru-u" placeholder="choose a username" autocapitalize="none">
      </div>
      <div class="field"><label>Password</label>
        <input id="ru-p" type="password" placeholder="at least 4 characters">
      </div>
      <div class="field"><label>Confirm Password</label>
        <input id="ru-p2" type="password" placeholder="repeat password"
          onkeydown="if(event.key==='Enter')doRegister()">
      </div>
      <div class="frow">
        <div class="field"><label>Age (optional)</label>
          <input id="ru-age" type="number" placeholder="25" min="13" max="99">
        </div>
        <div class="field"><label>Gender</label>
          <select id="ru-sex">
            <option value="">Prefer not</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Location (optional)</label>
        <input id="ru-loc" placeholder="London, UK" maxlength="30">
      </div>
      <!-- Avatar picker -->
      <div style="margin-bottom:12px">
        <div style="font-size:10px;font-weight:800;color:var(--text2);margin-bottom:7px;text-transform:uppercase;letter-spacing:.6px">Choose Your Avatar</div>
        <div class="av-grid" id="reg-av-grid"></div>
      </div>
      <button class="btn-go" onclick="doRegister()">Create Account →</button>
      <div class="err" id="ru-err"></div>
    </div>

    <div style="display:flex;align-items:center;gap:10px;margin:14px 0;font-size:11px;color:var(--text3)">
      <div style="flex:1;height:1px;background:var(--border)"></div>or<div style="flex:1;height:1px;background:var(--border)"></div>
    </div>
    <a class="poker-pill" href="https://pokerchimps.com/poker.html">
      🎰 Play Poker Chimps — same login!
    </a>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- TOPBAR -->
  <div class="topbar">

    <!-- Room pills (desktop) -->
    <div class="topbar-center" id="room-pills">

    </div>

    <div class="topbar-right">

      <div class="user-chip" onclick="openProfile()">
        <span class="user-chip-av" id="chip-av">🐒</span>
        <span class="user-chip-name" id="chip-name">Me</span>
      </div>
      <div class="icon-btn" onclick="openProfile()" title="Profile & Settings" style="font-size:14px">⚙️</div>

  </div>

  <!-- BODY -->
  <div class="app-body">

    <!-- SIDEBAR (desktop) -->
    <div class="sidebar" id="sidebar">
      <div style="flex:1;overflow-y:auto;padding:6px 0" id="sb-room-list">
        <!-- populated by JS -->
      </div>
      <div class="sb-divider"></div>
      <div class="sb-poker">
        <a href="https://pokerchimps.com/poker.html">
          🎰
          <div>
            <div style="font-size:12px">Poker Chimps</div>
            <div style="font-size:10px;opacity:.5;font-weight:400">Same login · Play now</div>
          </div>

      </div>

  </div><!-- /app-body -->

  <!-- MOBILE NAV -->

      <span class="mnav-icon">💬</span>Chat

    <button class="mnav-btn" id="mn-rooms" onclick="toggleRoomsDrawer()">
      <span class="mnav-icon">📋</span>Rooms
    </button>
    <button class="mnav-btn" id="mn-poker" onclick="window.open('https://pokerchimps.com/poker.html','_blank')">
      <span class="mnav-icon">🎰</span>Poker
    </button>
    <button class="mnav-btn" id="mn-me" onclick="openProfile()">
      <span class="mnav-icon" id="mn-av">🐒</span>Me
    </button>
  </div>

</div><!-- /app -->

<!-- ROOMS DRAWER (mobile) -->
<div class="rooms-drawer" id="rooms-drawer">

  <div class="drawer-body" id="drawer-room-list"></div>

  </div>
</div>

<script>
/* ══════════════════════════════════════════════════

══════════════════════════════════════════════════ */

/* ── ROOMS ──
   Each room maps to an AddaChat room name.
   The 'main' room already has real people in it.
   Additional rooms are BritChat-specific sub-rooms.
*/

const AVATARS = ['🐒','🦍','🦧','🐵','😎','🤠','🧐','😏','👑','💎','🎩','🃏','🌟','🔥','💀','👾','🦊','🐻','🎭','🤖','🏋️','🧙','🦁','🐯','🐺'];

/* ── STATE ── */
let me = null;
let currentRoom = 'main';

/* ══ INIT ══ */
window.onload = () => {
  buildAvatarGrid('reg-av-grid');
  // Try auto-login
  const sess = localStorage.getItem('nt_session');
  if(sess){
    let ud = tryLocalLogin(sess);
    if(ud){ me=ud; startApp(); return; }
    // Firebase fallback
    fetch(FB+'/pc_users/'+sess+'.json')
      .then(r=>r.json())
      .then(d=>{
        if(d&&(d.username||d.name)){
          me=d;
          try{ localStorage.setItem('pc_user_'+sess, JSON.stringify(d)); }catch(e){}
          startApp();
        } else { showAuth(); }
      }).catch(()=>showAuth());
    return;
  }
  showAuth();
};

function tryLocalLogin(username){
  try{
    const r = localStorage.getItem('pc_user_'+username);
    if(r) return JSON.parse(r);
  }catch(e){}
  try{
    const u = JSON.parse(localStorage.getItem('nt_users')||'{}');
    if(u[username]) return u[username];
  }catch(e){}
  return null;
}

function showAuth(){
  document.getElementById('loading').style.display='none';
  document.getElementById('auth').style.display='flex';
  buildAvatarGrid('reg-av-grid');
}

function buildAvatarGrid(id){
  const g=document.getElementById(id);
  if(!g||g.children.length)return;
  AVATARS.forEach((av,i)=>{
    const b=document.createElement('button');
    b.className='av-opt'+(i===0?' sel':'');
    b.textContent=av;b.type='button';
    b.onclick=()=>{ g.querySelectorAll('.av-opt').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); };
    g.appendChild(b);
  });
}

/* ══ AUTH ══ */
function switchTab(t){
  document.getElementById('tab-in').classList.toggle('on',t==='in');
  document.getElementById('tab-up').classList.toggle('on',t==='up');
  document.getElementById('form-in').style.display=t==='in'?'block':'none';
  document.getElementById('form-up').style.display=t==='up'?'block':'none';
}

function doSignIn(){
  const u=document.getElementById('si-u').value.trim().toLowerCase().replace(/\s+/g,'_');
  const p=document.getElementById('si-p').value;
  const err=document.getElementById('si-err');
  if(!u||!p){err.textContent='Please fill in all fields';return;}

  let ud=tryLocalLogin(u);
  if(ud){
    const h1=btoa(unescape(encodeURIComponent(p)));
    const h2=btoa(p);
    if(ud.password===h1||ud.password===h2||ud.password===p){
      me=ud; localStorage.setItem('nt_session',u);
      document.getElementById('auth').style.display='none';
      startApp();
    } else { err.textContent='Incorrect password'; }
    return;
  }
  // Try Firebase
  err.textContent='Checking…';
  fetch(FB+'/pc_users/'+u+'.json').then(r=>r.json()).then(d=>{
    if(!d){err.textContent='Username not found';return;}
    const h1=btoa(unescape(encodeURIComponent(p)));
    const h2=btoa(p);
    if(d.password===h1||d.password===h2){
      me=d; localStorage.setItem('pc_user_'+u,JSON.stringify(d)); localStorage.setItem('nt_session',u);
      document.getElementById('auth').style.display='none';
      startApp();
    } else { err.textContent='Incorrect password'; }
  }).catch(()=>err.textContent='Connection error — try again');
}

function doRegister(){
  const u=document.getElementById('ru-u').value.trim().toLowerCase().replace(/\s+/g,'_');
  const p=document.getElementById('ru-p').value;
  const p2=document.getElementById('ru-p2').value;
  const age=document.getElementById('ru-age').value||'';
  const sex=document.getElementById('ru-sex').value||'';
  const loc=document.getElementById('ru-loc').value.trim()||'';
  const av=document.querySelector('#reg-av-grid .av-opt.sel')?.textContent||'🐒';
  const err=document.getElementById('ru-err');

  if(!u||u.length<2){err.textContent='Username must be at least 2 characters';return;}
  if(!/^[a-z0-9_]+$/.test(u)){err.textContent='Username: letters, numbers and _ only';return;}
  if(!p||p.length<4){err.textContent='Password must be at least 4 characters';return;}
  if(p!==p2){err.textContent='Passwords do not match';return;}
  if(localStorage.getItem('pc_user_'+u)){err.textContent='Username already taken';return;}

  const displayName=u.split('_').map(w=>w[0].toUpperCase()+w.slice(1)).join(' ');
  const userData={
    username:u, name:displayName,
    password:btoa(unescape(encodeURIComponent(p))),
    avatar:av, color:'#c8960c',
    chips:10000, joinedAt:Date.now(),
    age, sex, location:loc,
    profile:{wins:0,losses:0,handsPlayed:0,biggestWin:0,totalWon:0},
    friends:[], friendRequests:[],
  };

  localStorage.setItem('pc_user_'+u,JSON.stringify(userData));
  try{
    const all=JSON.parse(localStorage.getItem('nt_users')||'{}');
    all[u]=userData; localStorage.setItem('nt_users',JSON.stringify(all));
  }catch(e){}
  // Firebase backup (non-blocking)
  fetch(FB+'/pc_users/'+u+'.json',{
    method:'PUT',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(userData)
  }).catch(()=>{});

  localStorage.setItem('nt_session',u);
  me=userData;
  document.getElementById('auth').style.display='none';
  startApp();
}

function doSignOut(){
  localStorage.removeItem('nt_session');
  me=null;
  document.getElementById('app').classList.remove('on');
  document.getElementById('auth').style.display='flex';
  switchTab('in');
  // Clear iframe
  document.getElementById('addachat-frame').src='';
}

/* ══ APP START ══ */
function startApp(){
  document.getElementById('loading').style.display='none';
  document.getElementById('auth').style.display='none';
  document.getElementById('app').classList.add('on');
  updateUserChip();
  buildRoomLists();
  joinRoom('main'); // Start in main public room with real people
}

function updateUserChip(){
  if(!me)return;
  const av=me.avatar||'🐒';
  document.getElementById('chip-av').textContent=av;

/* ══ ROOMS ══ */
function buildRoomLists(){
  buildSidebarRooms();
  buildRoomPills();
  buildDrawerRooms();
}

function buildSidebarRooms(){
  const el=document.getElementById('sb-room-list');
  if(!el)return;
  // Group rooms
  const groups={};
  ROOMS.forEach(r=>{ if(!groups[r.group])groups[r.group]=[]; groups[r.group].push(r); });
  el.innerHTML='';
  Object.entries(groups).forEach(([grp,rooms])=>{
    const t=document.createElement('div');
    t.className='sb-title';t.textContent=grp;el.appendChild(t);
    rooms.forEach(r=>{
      const btn=document.createElement('button');
      btn.className='sb-room'+(r.id===currentRoom?' active':'');
      btn.id='sbr-'+r.id;
      btn.innerHTML=`<span class="sb-room-icon">${r.icon}</span><span class="sb-room-name">${r.name}</span>`;
      btn.onclick=()=>joinRoom(r.id);
      el.appendChild(btn);
    });
    const d=document.createElement('div');d.style.cssText='height:1px;background:var(--border);margin:6px 10px';el.appendChild(d);
  });
}

function buildRoomPills(){
  const el=document.getElementById('room-pills');
  if(!el)return;
  // Show first 4 rooms as pills
  el.innerHTML=ROOMS.slice(0,4).map(r=>
    `<div class="room-pill${r.id===currentRoom?' active':''}" id="pill-${r.id}" onclick="joinRoom('${r.id}')">${r.icon} ${r.name}</div>`
  ).join('');
}

function buildDrawerRooms(){
  const el=document.getElementById('drawer-room-list');
  if(!el)return;
  const groups={};
  ROOMS.forEach(r=>{ if(!groups[r.group])groups[r.group]=[]; groups[r.group].push(r); });
  el.innerHTML='';
  Object.entries(groups).forEach(([grp,rooms])=>{
    const t=document.createElement('div');
    t.style.cssText='font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:12px 4px 6px';
    t.textContent=grp;el.appendChild(t);
    rooms.forEach(r=>{
      const btn=document.createElement('div');
      btn.style.cssText='display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:10px;cursor:pointer;transition:background .15s';
      btn.innerHTML=`<div style="font-size:22px;width:30px;text-align:center">${r.icon}</div><div><div style="font-size:14px;font-weight:700;color:var(--text)">${r.name}</div><div style="font-size:11px;color:var(--text2)">${r.desc}</div></div>`;
      btn.onmouseover=()=>btn.style.background='var(--surface)';
      btn.onmouseout=()=>btn.style.background='';
      btn.onclick=()=>{ joinRoom(r.id); toggleRoomsDrawer(); };
      el.appendChild(btn);
    });
  });
}

/* ══ JOIN ROOM — loads AddaChat iframe with user's name ══ */
function joinRoom(id){
  const room = ROOMS.find(r=>r.id===id)||ROOMS[0];
  currentRoom = id;

  // Update banner
  document.getElementById('cb-icon').textContent=room.icon;
  document.getElementById('cb-name').textContent=room.name;
  document.getElementById('cb-desc').textContent=room.desc;

  // Highlight active room in all lists
  document.querySelectorAll('.sb-room').forEach(b=>b.classList.toggle('active',b.id==='sbr-'+id));
  document.querySelectorAll('.room-pill').forEach(b=>b.classList.toggle('active',b.id==='pill-'+id));

  // Build the AddaChat URL — pass user's name automatically
  // This is the magic: name= parameter puts their BritChat name in the chat
  const userName = encodeURIComponent(me?.name||me?.username||'BritChatUser');
  const acRoom = encodeURIComponent(room.ac||'main');

  // Dark green theme to match BritChat
  // bg=081408 matches our --bg colour
  const url = `https://chat.addachat.com/?`
    +`bgs=on`
    +`&bg=081408`
    +`&name=${userName}`
    +`&room=${acRoom}`
    +`&sidebar=on`
    +`&format=on`
    +`&images=on`;

  document.getElementById('addachat-frame').src=url;
}

  const avHtml=AVATARS.map(av=>`
    <button type="button" onclick="setAvatar('${av}',this)"
      style="aspect-ratio:1;border-radius:9px;border:2px solid ${me.avatar===av?'var(--gold)':'transparent'};background:var(--surface);font-size:24px;cursor:pointer;transition:all .15s;width:100%"

  ov.innerHTML=`
    <div class="ov-card">

      </label>
      <button onclick="this.closest('.ov').remove()" style="width:100%;padding:9px;background:var(--surface);border:1px solid var(--border);color:var(--text2);border-radius:9px;cursor:pointer;font-family:var(--sans)">Close</button>
    </div>`;

function setAvatar(av){
  me.avatar=av;
  try{localStorage.setItem('pc_user_'+me.username,JSON.stringify(me));}catch(e){}
  fetch(FB+'/pc_users/'+me.username+'.json',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({avatar:av})}).catch(()=>{});
  document.querySelector('.ov.on:last-child')?.remove();
  updateUserChip();
  showToast('Avatar updated!');
}

function uploadPhoto(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const data=ev.target.result;
    if(data.length>150000){showToast('Photo too large — max 100KB');return;}
    me.avatar=data;
    try{localStorage.setItem('pc_user_'+me.username,JSON.stringify(me));}catch(e){}
    document.querySelector('.ov.on:last-child')?.remove();
    updateUserChip();showToast('Photo set!');
  };
  reader.readAsDataURL(file);
}

    const msgs=d?Object.entries(d).filter(([k])=>k==='admin_messages').flatMap(([,v])=>Object.values(v||{})):[];
    document.getElementById('admin-data').innerHTML=`
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
        <div style="background:var(--surface);border-radius:9px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:900;color:var(--gold2)">${profiles.length}</div><div style="font-size:10px;color:var(--text2)">Players</div></div>
        <div style="background:var(--surface);border-radius:9px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:900;color:var(--accent)">${profiles.reduce((s,p)=>s+(p.handsPlayed||0),0)}</div><div style="font-size:10px;color:var(--text2)">Hands</div></div>
        <div style="background:var(--surface);border-radius:9px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:900;color:var(--gold2)">🪙${(profiles.reduce((s,p)=>s+(p.chips||0),0)/1000).toFixed(0)}k</div><div style="font-size:10px;color:var(--text2)">Chips</div></div>
      </div>
      <div style="font-weight:800;color:var(--gold2);margin-bottom:8px">Top Players</div>
      ${profiles.slice(0,10).map((p,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)"><div style="color:var(--text3);font-size:12px;width:18px">${i+1}</div><div style="font-size:16px">${p.avatar||p.av||'🎰'}</div><div style="flex:1;font-weight:700;font-size:13px">${p.name||'?'}</div><div style="color:var(--gold2);font-size:13px">🪙${(p.chips||0).toLocaleString()}</div></div>`).join('')}
      ${msgs.length?`<div style="font-weight:800;color:var(--gold2);margin:12px 0 8px">Player Messages (${msgs.length})</div>`+msgs.sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0,5).map(m=>`<div style="background:var(--surface);border-radius:8px;padding:10px;margin-bottom:6px"><div style="font-weight:700;color:var(--gold2)">${m.from} — ${m.subject||''}</div><div style="font-size:12px;color:var(--text);margin-top:4px">${m.body||''}</div></div>`).join(''):''}
    `;
  }).catch(()=>document.getElementById('admin-data').textContent='Could not load data');
}
</script>
</body>
</html>
