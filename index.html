<style>
:root{
  --bg:#080f08;--bg2:#0d180d;--bg3:#0f1e0f;
  --surface:#162316;--surface2:#1c2e1c;
  --border:rgba(80,180,60,.15);--border2:rgba(80,180,60,.28);
  --green:#2d7a2d;--green2:#3aaa3a;--green3:#4dc44d;
  --gold:#c8960c;--gold2:#f0c060;--gold3:#ffd700;
  --text:#e0f0e0;--text2:rgba(180,230,180,.55);--text3:rgba(180,230,180,.28);
  --accent:#44cc44;--danger:#cc3333;--online:#44dd88;
  --sans:'DM Sans',sans-serif;--display:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans)}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 60% at 10% 20%,rgba(45,122,45,.22) 0%,transparent 60%),
    radial-gradient(ellipse 60% 80% at 90% 80%,rgba(200,150,12,.1) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 50% 100%,rgba(45,100,45,.12) 0%,transparent 60%);
}

/* ══ LOADING ══ */
#loading{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green3);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══ AUTH ══ */
#auth{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:16px;background:var(--bg)}
.auth-card{
  background:linear-gradient(145deg,var(--bg2),var(--bg3));
  border:1px solid var(--border2);border-radius:20px;
  padding:26px 22px;width:100%;max-width:360px;
  box-shadow:0 24px 80px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.04);
  position:relative;z-index:1;
}
.auth-logo{font-family:var(--display);font-size:28px;font-weight:900;color:var(--gold2);text-align:center;margin-bottom:4px;letter-spacing:-.5px;cursor:pointer;user-select:none}
.auth-sub{text-align:center;font-size:11px;color:var(--text2);margin-bottom:18px;letter-spacing:.5px}
.tabs{display:flex;background:var(--surface);border-radius:10px;padding:3px;margin-bottom:16px}
.tab{flex:1;padding:8px;border:none;background:none;color:var(--text2);font-family:var(--sans);font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;transition:all .2s}
.tab.on{background:var(--green);color:#fff}
.f{margin-bottom:10px}
.f label{display:block;font-size:10px;font-weight:800;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.6px}
.f input,.f select{width:100%;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;transition:border .2s}
.f input:focus,.f select:focus{border-color:var(--green3)}
.f select option{background:var(--bg2)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--green),var(--green2));border:none;border-radius:10px;color:#fff;font-family:var(--display);font-size:15px;font-weight:800;cursor:pointer;letter-spacing:.3px;transition:all .15s;margin-top:4px}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.err{font-size:12px;color:#ff8888;text-align:center;margin-top:6px;min-height:16px}
.divider{display:flex;align-items:center;gap:10px;margin:12px 0;font-size:11px;color:var(--text3)}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.poker-link{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 14px;background:rgba(200,150,12,.1);border:1px solid rgba(200,150,12,.3);border-radius:10px;color:var(--gold2);font-size:13px;font-weight:700;text-decoration:none;transition:all .15s}
.poker-link:hover{background:rgba(200,150,12,.2)}

/* avatar grid */
.av-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:10px}
.av-btn{aspect-ratio:1;border-radius:8px;border:2px solid transparent;background:var(--surface);font-size:20px;cursor:pointer;transition:all .15s}
.av-btn:hover{border-color:var(--green3)}
.av-btn.sel{border-color:var(--gold);background:rgba(200,150,12,.15)}

/* ══ APP ══ */
#app{display:none;height:100%;flex-direction:column;position:relative;z-index:1}
#app.on{display:flex}

/* TOPBAR */
.topbar{height:50px;display:flex;align-items:center;gap:8px;padding:0 12px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);position:relative;z-index:50}
.logo{font-family:var(--display);font-size:20px;font-weight:900;color:var(--gold2);letter-spacing:-.5px;cursor:pointer;user-select:none;flex-shrink:0}
.topbar-mid{flex:1;display:flex;align-items:center;gap:6px;overflow:hidden}
.rpill{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:700;background:var(--surface);border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.rpill.on{background:var(--green);border-color:var(--green3);color:#fff}
.rpill:hover:not(.on){background:var(--surface2);color:var(--text)}
.topbar-right{display:flex;gap:5px;align-items:center;flex-shrink:0}
.uc{display:flex;align-items:center;gap:6px;padding:4px 10px 4px 5px;background:var(--surface);border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:all .15s}
.uc:hover{background:var(--surface2)}
.uc-av{font-size:18px;line-height:1}
.uc-name{font-size:12px;font-weight:700;color:var(--text);max-width:75px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* BODY */
.body{flex:1;display:flex;overflow:hidden;min-height:0}

/* SIDEBAR */
.sidebar{width:175px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
@media(max-width:680px){.sidebar{display:none}}
.sb-scroll{flex:1;overflow-y:auto;padding:6px 0}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.sb-grp{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:10px 12px 4px}
.sb-r{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;border:none;background:none;color:var(--text2);font-family:var(--sans);font-size:12px;font-weight:500;width:100%;text-align:left;cursor:pointer;transition:all .15s}
.sb-r:hover{background:var(--surface);color:var(--text)}
.sb-r.on{background:var(--green);color:#fff}
.sb-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-div{height:1px;background:var(--border);margin:6px 10px}
.sb-poker{margin:8px;border-radius:9px;background:linear-gradient(135deg,rgba(200,150,12,.18),rgba(200,150,12,.06));border:1px solid rgba(200,150,12,.3)}
.sb-poker a{display:flex;align-items:center;gap:8px;padding:9px 11px;color:var(--gold2);font-size:12px;font-weight:700;text-decoration:none}
.sb-out{padding:8px}
.sb-out button{width:100%;padding:7px;background:rgba(200,50,50,.15);border:1px solid rgba(200,50,50,.3);color:#ff8888;border-radius:8px;cursor:pointer;font-size:12px;font-family:var(--sans)}

/* CHAT WRAP */
.chat-wrap{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;position:relative}

/* BANNER */
.banner{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.banner-icon{font-size:20px}
.banner-info{flex:1;min-width:0}
.banner-name{font-size:14px;font-weight:800;color:var(--text)}
.banner-desc{font-size:11px;color:var(--text2)}
.banner-live{font-size:11px;color:var(--online);font-weight:700;background:rgba(68,221,136,.1);border:1px solid rgba(68,221,136,.25);padding:3px 9px;border-radius:20px;flex-shrink:0;white-space:nowrap}

/* CHAT INSTANCE SWITCHER — shows which domain/instance we're on */
.instance-bar{
  display:flex;align-items:center;gap:6px;padding:5px 12px;
  background:rgba(200,150,12,.05);border-bottom:1px solid rgba(200,150,12,.12);
  flex-shrink:0;overflow-x:auto;
}
.instance-bar::-webkit-scrollbar{height:0}
.inst-btn{
  padding:3px 10px;border-radius:14px;font-size:11px;font-weight:700;
  background:var(--surface);border:1px solid var(--border);color:var(--text3);
  cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;
}
.inst-btn:hover{color:var(--text);border-color:var(--border2)}
.inst-btn.on{background:rgba(200,150,12,.2);border-color:rgba(200,150,12,.5);color:var(--gold2)}
.inst-label{font-size:10px;color:var(--text3);font-weight:600;flex-shrink:0}

/* THE IFRAME */
#chat-frame{flex:1;border:none;width:100%;min-height:0;display:block;background:var(--bg)}

/* CUSTOM INPUT BAR — sits below iframe, sends via postMessage / URL command */
.custom-input-bar{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;
  background:var(--bg2);border-top:1px solid var(--border);
  flex-shrink:0;
}
.custom-input-wrap{
  flex:1;display:flex;align-items:center;gap:6px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:11px;padding:8px 12px;
  transition:border .2s;
}
.custom-input-wrap:focus-within{border-color:var(--green3)}
.custom-input-wrap textarea{
  flex:1;background:none;border:none;outline:none;resize:none;
  color:var(--text);font-family:var(--sans);font-size:14px;
  min-height:20px;max-height:80px;line-height:1.4;
}
.custom-input-wrap textarea::placeholder{color:var(--text3)}
.eq{display:flex;gap:2px}
.eq button{background:none;border:none;font-size:17px;cursor:pointer;padding:1px;opacity:.55;transition:opacity .15s;line-height:1}
.eq button:hover{opacity:1}
.send{width:38px;height:38px;border-radius:10px;background:var(--green);border:none;color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.send:hover{background:var(--green2);transform:scale(1.05)}
.send:active{transform:scale(.95)}

/* NAME TAG PREVIEW */
.tag-preview{
  font-size:10px;color:var(--text3);padding:0 12px 4px;
  flex-shrink:0;display:flex;align-items:center;gap:6px;
}
.tag-preview-name{font-weight:700;color:var(--green3)}

/* MOBILE NAV */
.mnav{display:none;background:var(--bg2);border-top:1px solid var(--border);padding:5px 4px;flex-shrink:0}
@media(max-width:680px){
  .mnav{display:flex;justify-content:space-around}
  .topbar-mid{display:none}
}
.mn-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--text3);cursor:pointer;font-family:var(--sans);font-size:10px;font-weight:700;padding:5px 10px;border-radius:8px;transition:all .15s}
.mn-btn.on{color:var(--accent)}
.mn-icon{font-size:19px}

/* OVERLAYS */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:500;display:none;align-items:center;justify-content:center;padding:16px}
.ov.on{display:flex}
.ov-card{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:22px;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,.7);max-height:90vh;overflow-y:auto}
.ov-card h3{font-family:var(--display);font-size:18px;font-weight:800;color:var(--gold2);margin-bottom:14px}
.ov-card::-webkit-scrollbar{width:3px}
.ov-card::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ROOMS DRAWER */
.drawer{position:fixed;inset:0;z-index:400;background:var(--bg2);display:none;flex-direction:column}
.drawer.on{display:flex}
.drawer-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.drawer-title{font-family:var(--display);font-size:18px;font-weight:800;color:var(--gold2)}
.drawer-close{background:var(--surface);border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.drawer-body{flex:1;overflow-y:auto;padding:10px}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:10px 22px;border-radius:30px;font-size:13px;font-weight:600;z-index:9999;display:none;box-shadow:0 8px 32px rgba(0,0,0,.5);white-space:nowrap}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>
<body>

<div id="loading">
  <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:900;color:var(--gold2)">🐒 BritChat</div>
  <div class="spin"></div>
</div>

<!-- AUTH -->
<div id="auth">
  <div class="auth-card">
    <div class="auth-logo" id="logo-tap">🐒 BritChat</div>
    <div class="auth-sub">🇬🇧 Free UK Chat · Same login as Poker Chimps 🎰</div>
    <div class="tabs">
      <button class="tab on" id="ti" onclick="swTab('in')">Sign In</button>
      <button class="tab" id="tu" onclick="swTab('up')">Register</button>
    </div>
    <div id="fi">
      <div class="f"><label>Username</label><input id="su" placeholder="your_username" autocapitalize="none" autocomplete="username"></div>
      <div class="f"><label>Password</label><input id="sp" type="password" placeholder="••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doIn()"></div>
      <button class="btn" onclick="doIn()">Sign In →</button>
      <div class="err" id="se"></div>
    </div>
    <div id="fu" style="display:none">
      <div class="f"><label>Username</label><input id="ru" placeholder="choose_username" autocapitalize="none"></div>
      <div class="f"><label>Password</label><input id="rp" type="password" placeholder="min 4 characters"></div>
      <div class="f"><label>Confirm Password</label><input id="rp2" type="password" placeholder="repeat password" onkeydown="if(event.key==='Enter')doUp()"></div>
      <div class="frow">
        <div class="f"><label>Age</label><input id="ra" type="number" placeholder="25" min="13" max="99"></div>
        <div class="f"><label>Gender</label>
          <select id="rs"><option value="">Prefer not</option><option>Male</option><option>Female</option><option>Other</option></select>

      <div class="f"><label>Location</label><input id="rl" placeholder="London, UK" maxlength="30"></div>
      <div style="margin-bottom:10px">

    <a class="poker-link" href="https://pokerchimps.com/poker.html">🎰 Play Poker Chimps — same login!</a>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="logo" onclick="toggleDrawer()">🐒 BritChat</div>
    <div class="topbar-mid" id="pills"></div>
    <div class="topbar-right">
      <div class="uc" onclick="openProfile()">
        <span class="uc-av" id="uc-av">🐒</span>
        <span class="uc-name" id="uc-nm">Me</span>
      </div>
    </div>
  </div>

  <div class="body">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sb-scroll" id="sb-list"></div>
      <div class="sb-div"></div>
      <div class="sb-poker"><a href="https://pokerchimps.com/poker.html">🎰<div><div style="font-size:12px">Poker Chimps</div><div style="font-size:10px;opacity:.5;font-weight:400">Same login · Play now</div></div></a></div>
      <div class="sb-out"><button onclick="doOut()">⏻ Sign Out</button></div>
    </div>

    <!-- CHAT -->
    <div class="chat-wrap">
      <div class="banner">
        <div class="banner-icon" id="bn-icon">💬</div>
        <div class="banner-info">
          <div class="banner-name" id="bn-name">Main Chat</div>
          <div class="banner-desc" id="bn-desc">Live chat — real people worldwide</div>
        </div>
        <div class="banner-live">🟢 Live</div>
      </div>

      <!-- INSTANCE SWITCHER — try all 3 domains -->
      <div class="instance-bar">
        <div class="inst-label">Server:</div>
        <button class="inst-btn on" id="inst-0" onclick="switchInstance(0)">addachat.com</button>
        <button class="inst-btn" id="inst-1" onclick="switchInstance(1)">poo.com</button>
        <button class="inst-btn" id="inst-2" onclick="switchInstance(2)">htmlchat.org</button>
        <div style="flex:1"></div>
        <div style="font-size:10px;color:var(--text3)" id="inst-status">Connected</div>
      </div>

      <!-- ADDACHAT / HTMLCHAT IFRAME — full screen -->
      <iframe id="chat-frame"
        src=""
        allow="camera;microphone"
        scrolling="yes"
        title="BritChat Live Room">
      </iframe>

    </div>
  </div><!-- /body -->

  <!-- MOBILE NAV -->
  <div class="mnav">
    <button class="mn-btn on" id="mn-chat" onclick="mn('chat')"><span class="mn-icon">💬</span>Chat</button>
    <button class="mn-btn" id="mn-rooms" onclick="toggleDrawer()"><span class="mn-icon">📋</span>Rooms</button>
    <button class="mn-btn" onclick="window.open('https://pokerchimps.com/poker.html','_blank')"><span class="mn-icon">🎰</span>Poker</button>
    <button class="mn-btn" onclick="openProfile()"><span class="mn-icon" id="mn-av">🐒</span>Me</button>
  </div>
</div><!-- /app -->

<!-- ROOMS DRAWER -->
<div class="drawer" id="drawer">
  <div class="drawer-hdr">
    <div class="drawer-title">📋 Chat Rooms</div>
    <button class="drawer-close" onclick="toggleDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="dr-list"></div>
</div>

<!-- PROFILE OVERLAY -->
<div class="ov" id="prof-ov" onclick="if(event.target===this)this.classList.remove('on')">
  <div class="ov-card">
    <h3>👤 My Profile</h3>
    <div id="prof-body"></div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ══════════════════════════════════════════════════════
   BRITCHAT v3 — Deep AddaChat / HTMLChat Integration
   
   WHAT WE DO WITH THE URL PARAMETERS:
   ─────────────────────────────────────
   name=    → User's BritChat display name (auto-filled from login)
   room=    → Chat room name (our BritChat rooms)
   bg=      → Background colour (matches our dark green theme)
   fg=      → Foreground/text colour
   bgs=on   → Enable background setting
   sidebar= → on/off (we hide it for cleaner look, use our own)
   format=  → on/off (HTML tags in messages)
   images=  → on/off/small
   instance=→ Custom private chat instance name (our BritChat namespace)
   
   THREE DOMAINS — all same chat engine:
   chat.addachat.com  (main - most users)
   chat.poo.com       (same engine, different domain)
   chat.htmlchat.org  (same engine, different domain)
   
   HTML TAG FORMAT (for custom name styling):
   We send messages with HTML tags so the user's name
   appears in our BritChat brand style (gold colour etc.)
══════════════════════════════════════════════════════ */

const FB = 'https://britchat-6faa5-default-rtdb.firebaseio.com';

/* The three domains — all run the same chat engine */
const DOMAINS = [
  'chat.addachat.com',
  'chat.poo.com',
  'chat.htmlchat.org',
];
let currentDomain = 0;

/* 
  ROOMS — each has:
  - id: our internal id
  - name: display name
  - icon: emoji
  - desc: description  
  - room: the AddaChat room parameter (joins this room on their server)
  - instance: optional — creates a private BritChat sub-instance
  - group: sidebar group label
*/
const ROOMS = [

/* ══ INIT ══ */
window.onload = () => {
  buildAvGrid('av-g');
  const sess = localStorage.getItem('nt_session');
  if(sess){
    let ud = getLocal(sess);
    if(ud){ me=ud; launch(); return; }
    // Firebase fallback
    fetch(FB+'/pc_users/'+sess+'.json').then(r=>r.json()).then(d=>{
      if(d&&(d.username||d.name)){
        me=d;
        try{localStorage.setItem('pc_user_'+sess,JSON.stringify(d));}catch(e){}
        launch();
      } else showAuth();
    }).catch(()=>showAuth());
    return;
  }
  showAuth();
};

function getLocal(u){
  try{ const r=localStorage.getItem('pc_user_'+u); if(r)return JSON.parse(r); }catch(e){}
  try{ const a=JSON.parse(localStorage.getItem('nt_users')||'{}'); if(a[u])return a[u]; }catch(e){}
  return null;
}
function showAuth(){
  document.getElementById('loading').style.display='none';
  document.getElementById('auth').style.display='flex';
}
function buildAvGrid(id){
  const g=document.getElementById(id); if(!g||g.children.length)return;
  AVEMOJIS.forEach((a,i)=>{
    const b=document.createElement('button');b.className='av-btn'+(i===0?' sel':'');b.textContent=a;b.type='button';
    b.onclick=()=>{g.querySelectorAll('.av-btn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');};

  });

function swTab(t){
  document.getElementById('ti').classList.toggle('on',t==='in');
  document.getElementById('tu').classList.toggle('on',t==='up');
  document.getElementById('fi').style.display=t==='in'?'block':'none';
  document.getElementById('fu').style.display=t==='up'?'block':'none';
}
function doIn(){
  const u=document.getElementById('su').value.trim().toLowerCase().replace(/\s+/g,'_');
  const p=document.getElementById('sp').value;
  const err=document.getElementById('se');
  if(!u||!p){err.textContent='Please fill in all fields';return;}
  let ud=getLocal(u);
  if(ud){
    const h=btoa(unescape(encodeURIComponent(p)));
    if(ud.password===h||ud.password===btoa(p)||ud.password===p){
      me=ud;localStorage.setItem('nt_session',u);
      document.getElementById('auth').style.display='none';launch();
    }else{err.textContent='Incorrect password';}
    return;
  }
  err.textContent='Checking…';
  fetch(FB+'/pc_users/'+u+'.json').then(r=>r.json()).then(d=>{
    if(!d){err.textContent='Username not found';return;}
    const h=btoa(unescape(encodeURIComponent(p)));
    if(d.password===h||d.password===btoa(p)){
      me=d;localStorage.setItem('pc_user_'+u,JSON.stringify(d));localStorage.setItem('nt_session',u);
      document.getElementById('auth').style.display='none';launch();
    }else{err.textContent='Incorrect password';}
  }).catch(()=>err.textContent='Connection error');
}
function doUp(){
  const u=document.getElementById('ru').value.trim().toLowerCase().replace(/\s+/g,'_');
  const p=document.getElementById('rp').value;
  const p2=document.getElementById('rp2').value;
  const age=document.getElementById('ra').value||'';
  const sex=document.getElementById('rs').value||'';
  const loc=document.getElementById('rl').value.trim()||'';
  const av=document.querySelector('#av-g .av-btn.sel')?.textContent||'🐒';
  const err=document.getElementById('re');
  if(!u||u.length<2){err.textContent='Username: min 2 characters';return;}
  if(!/^[a-z0-9_]+$/.test(u)){err.textContent='Letters, numbers and _ only';return;}
  if(!p||p.length<4){err.textContent='Password: min 4 characters';return;}
  if(p!==p2){err.textContent='Passwords do not match';return;}
  if(localStorage.getItem('pc_user_'+u)){err.textContent='Username taken';return;}
  const dn=u.split('_').map(w=>w[0].toUpperCase()+w.slice(1)).join(' ');
  const ud={username:u,name:dn,password:btoa(unescape(encodeURIComponent(p))),avatar:av,color:'#c8960c',chips:10000,joinedAt:Date.now(),age,sex,location:loc,profile:{wins:0,losses:0,handsPlayed:0,biggestWin:0,totalWon:0},friends:[],friendRequests:[]};

/* ══ JOIN ROOM — builds the AddaChat URL with all parameters ══ */
function joinRoom(id){
  const r=ROOMS.find(x=>x.id===id)||ROOMS[0];
  curRoom=id;

  // Update UI
  document.getElementById('bn-icon').textContent=r.icon;
  document.getElementById('bn-name').textContent=r.name;
  document.getElementById('bn-desc').textContent=r.desc;
  document.querySelectorAll('.sb-r').forEach(b=>b.classList.toggle('on',b.id==='sbr-'+id));
  document.querySelectorAll('.rpill').forEach(b=>b.classList.toggle('on',b.id==='pil-'+id));

  loadFrame(r);
}

function loadFrame(r){
  if(!me)return;
  const domain = DOMAINS[currentDomain];

  /*
    FULL PARAMETER EXPLANATION:
    
    name=     User's display name from BritChat login — pre-fills their name in chat
    room=     Which room to join
    instance= If set, creates a private namespace (our BritChat rooms)
              If empty, joins the shared public instance (real people)
    bg=       Background hex color — we match our dark green #080f08
    bgs=on    Activates the bg parameter
    sidebar=  on/off — we keep it on so users can see room list & user list inside chat
    format=   on — enables HTML in messages (lets us send styled name tags)
    images=   on — allows image sharing
    fg=       Foreground color for chat text (light green)
  */

  const name  = encodeURIComponent(me.name||me.username||'BritChatUser');
  const room  = encodeURIComponent(r.room||'main');
  const inst  = r.instance ? encodeURIComponent(r.instance) : '';

  let url = `https://${domain}/?`
    + `name=${name}`
    + `&room=${room}`
    + `&bgs=on`
    + `&bg=080f08`
    + `&sidebar=on`
    + `&format=on`
    + `&images=on`;

  // Add instance parameter for BritChat private rooms
  if(inst) url += `&instance=${inst}`;

  document.getElementById('chat-frame').src = url;
  document.getElementById('inst-status').textContent = '● Connected via '+domain;
}

/* ══ INSTANCE SWITCHER ══
   Switch between the 3 domains — all same chat data,
   useful if one is slow or down
*/
function switchInstance(i){
  currentDomain=i;
  document.querySelectorAll('.inst-btn').forEach((b,j)=>b.classList.toggle('on',j===i));
  document.getElementById('inst-status').textContent='Switching…';
  const r=ROOMS.find(x=>x.id===curRoom)||ROOMS[0];
  loadFrame(r);
  showToast('Switched to '+DOMAINS[i]);
}

    me.avatar=d;
    try{localStorage.setItem('pc_user_'+me.username,JSON.stringify(me));}catch(e){}
    document.querySelector('.ov.on:last-child')?.remove();
    updateChip();showToast('Photo set! 📷');
  };r.readAsDataURL(f);
}

/* ── 1. EMOJI AVATAR SYSTEM ──────────────────────────────── */

// Pool of emojis to assign randomly to unknown AddaChat users
const EMOJI_POOL = [
  '🦊','🐯','🦁','🐻','🐼','🦝','🦨','🦡','🦦','🦥',
  '🐺','🦮','🐕','🦴','🐱','🐭','🐹','🐰','🐸','🐨',
  '🦅','🦆','🦉','🦚','🦜','🐦','🌊','⚡','🔥','🌙',
  '🏴‍☠️','👾','🤖','🎭','🎩','💀','👑','💎','🌟','🎯'
];

// Assign a consistent emoji to any username (same name = same emoji)
function getEmojiForName(name) {
  if(!name) return '👤';
  // Hash the name to get consistent emoji
  let hash = 0;
  for(let i=0;i<name.length;i++) hash = ((hash<<5)-hash)+name.charCodeAt(i);
  return EMOJI_POOL[Math.abs(hash) % EMOJI_POOL.length];
}

// Build the display name for AddaChat iframe
// BritChat users: "[their avatar] [their name]" e.g. "🐒 DrunkyJoker"  
// Unknown users: get random emoji based on name hash
function buildChatName(user) {
  if(!user) return getEmojiForName('guest')+' Guest';
  const av = user.avatar || getEmojiForName(user.name||user.username||'');
  const name = user.name || user.username || 'Guest';
  // Strip emoji from avatar if it's a data URL (photo) — just use default
  const isPhoto = av && av.startsWith('data:');
  const prefix = isPhoto ? getEmojiForName(name) : av;
  return prefix + ' ' + name;
}

/* ── 2. HTML NAME TAG BUILDER ────────────────────────────── */
// AddaChat supports HTML in messages when format=on
// We build a styled HTML name tag for our users
// $n$ is replaced with the username inside AddaChat

function buildHTMLTag(user) {
  if(!user) return '';
  const av = user.avatar && !user.avatar.startsWith('data:') ? user.avatar : getEmojiForName(user.name||'');
  const name = user.name || user.username || 'Guest';
  const colour = user.color || '#f0c060';
  // This HTML tag gets injected via the name parameter
  // It styles the username label that appears before each message
  return `<span style="background:linear-gradient(135deg,#162316,#0d180d);border:1px solid rgba(80,180,60,.4);border-radius:6px;padding:1px 7px;font-family:DM Sans,sans-serif;font-weight:800;color:${colour};font-size:13px">${av} ${name}</span>`;
}

// Send a bot message via hidden iframe
// We reload a hidden iframe with the bot's name and a pre-typed message
// using the AddaChat name= parameter on the BritChat private instance
function botSendMessage(bot, room, message) {
  const botKey = 'bot_' + bot.name.replace(/[\s]+/g,'_');
  let frame = document.getElementById(botKey);
  if(!frame){
    frame = document.createElement('iframe');
    frame.id = botKey;
    frame.style.cssText = 'position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;top:-999px;left:-999px';
    frame.allow = 'camera;microphone';
    document.body.appendChild(frame);
    botIframes[botKey] = frame;
  }
  
  const botName = encodeURIComponent(bot.av + ' ' + bot.name.split(' ')[0]);
  const roomEnc = encodeURIComponent(room);
  
  // Open the BritChat private instance as this bot
  frame.src = `https://chat.addachat.com/?name=${botName}&room=${roomEnc}&instance=britchat&bg=080f08&bgs=on&format=on&sidebar=on`;
  
  // After the iframe loads, the bot's name is registered
  // We can't send messages directly due to cross-origin policy
  // BUT the bot joining the room IS visible to others as a user entering
  // This creates real activity in the room list
}

function startBots() {
  if(botActive) return;
  botActive = true;
  
  // Each bot joins a different BritChat room — creates activity across rooms
  const botRooms = ['general','pub','sport','poker','news','music','gaming','dating'];
  
  BOTS.forEach((bot, i) => {
    const room = botRooms[i % botRooms.length];
    // Stagger bot joins so they don't all appear at once
    setTimeout(() => {
      botSendMessage(bot, room, BOT_GREETINGS[i % BOT_GREETINGS.length]);
    }, (i+1) * 8000); // 8 seconds apart
  });
  
  showToast('🤖 BritChat bots are warming up the rooms!', 3000);
}

function stopBots() {
  botActive = false;
  botTimers.forEach(t=>clearTimeout(t));
  botTimers = [];
  Object.values(botIframes).forEach(f=>{ try{f.src='about:blank';}catch(e){} });
  showToast('🤖 Bots deactivated', 2000);
}

/* ── 4. AI-POWERED BOT RESPONSES (Claude API) ────────────── */
// This opens the admin's Anthropic API to generate intelligent
// bot responses. Bots respond to keywords typed in the chat.

let aiCooldown = false;
async function getAIBotResponse(userMessage, botPersona, roomName) {
  if(aiCooldown) return null;
  aiCooldown = true;
  setTimeout(()=>aiCooldown=false, 30000); // 30s cooldown between AI responses
  
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 80,
        messages: [{
          role: 'user',
          content: `You are a ${botPersona} in the "${roomName}" chat room of BritChat UK. 
Someone just said: "${userMessage}"
Reply in character in 1-2 short sentences. Keep it casual, fun, British. No hashtags. Max 80 chars.`
        }]
      })
    });
    const data = await res.json();
    return data.content?.[0]?.text || null;
  } catch(e) {
    return null;
  }
}

/* ── 5. IFRAME MESSAGE LISTENER ──────────────────────────── */
// Listen for any postMessage events from the AddaChat iframe
// If they emit events, we can react in real-time

window.addEventListener('message', (event) => {
  // Only listen to messages from AddaChat domains
  const trusted = ['addachat.com','poo.com','htmlchat.org'];
  if(!trusted.some(d => event.origin.includes(d))) return;
  
  // Log what we receive for debugging
  console.log('[BritChat] iframe message:', event.data);
  
  // If AddaChat sends user count or activity data, show it
  if(event.data && typeof event.data === 'object') {
    if(event.data.users) updateUserCount(event.data.users);
    if(event.data.message) showActivityPulse();
  }
  
  // String-based events
  if(typeof event.data === 'string') {
    if(event.data.includes('message')) showActivityPulse();
  }
});

    <div style="font-size:11px;font-weight:800;color:rgba(80,180,60,.7);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Chat Theme</div>
    ${Object.entries(BG_THEMES).map(([k,t])=>`<button class="tp-btn${k===currentTheme?' on':''}" onclick="setTheme('${k}');document.querySelectorAll('.tp-btn').forEach(b=>b.classList.remove('on'));this.classList.add('on')">${t.label}</button>`).join('')}
    <button class="tp-btn" onclick="toggleFrameTransparency(false)" style="border-color:rgba(80,150,255,.3);color:rgba(150,200,255,.8)">🌑 Reset Theme</button>
  `;
  document.body.appendChild(tp);
  
  // Bot panel
  const bp = document.createElement('div');
  bp.id = 'bot-panel';
  bp.innerHTML = `
    <div class="bp-title">🤖 Bot Control Room</div>
    ${BOTS.map((b,i)=>`<div class="bp-bot"><span class="bp-av">${b.av}</span><span class="bp-name">${b.name}</span><div class="bp-status" id="bst-${i}"></div></div>`).join('')}
    <button onclick="startBots()" style="margin-top:4px;padding:8px;background:rgba(68,204,68,.15);border:1px solid rgba(68,204,68,.3);color:var(--accent);border-radius:9px;cursor:pointer;font-size:12px;font-weight:700;font-family:var(--sans)">▶ Activate Bots</button>
    <button onclick="stopBots()" style="padding:8px;background:rgba(200,50,50,.12);border:1px solid rgba(200,50,50,.3);color:#ff8888;border-radius:9px;cursor:pointer;font-size:12px;font-weight:700;font-family:var(--sans)">■ Stop Bots</button>
    <div style="font-size:10px;color:rgba(180,130,240,.4);margin-top:4px;line-height:1.4">Bots join BritChat rooms as real users, creating activity and welcoming visitors</div>
  `;
  document.body.appendChild(bp);
}

function toggleThemePanel() {
  document.getElementById('theme-panel').classList.toggle('on');
  document.getElementById('bot-panel').classList.remove('on');
}
function toggleBotPanel() {
  document.getElementById('bot-panel').classList.toggle('on');
  document.getElementById('theme-panel').classList.remove('on');
}

// Update bot status indicators
function updateBotStatus(index, live) {
  const el = document.getElementById('bst-'+index);
  if(el) el.classList.toggle('live', live);
}

/* ── INIT MAGIC SYSTEM ───────────────────────────────────── */
function initMagic() {
  buildFABs();
  // Show welcome screen after short delay
  setTimeout(triggerWelcome, 800);
  // Close panels when clicking elsewhere
  document.addEventListener('click', (e) => {
    if(!e.target.closest('#theme-panel')&&!e.target.closest('.fab-theme')) document.getElementById('theme-panel')?.classList.remove('on');
    if(!e.target.closest('#bot-panel')&&!e.target.closest('.fab-bot')) document.getElementById('bot-panel')?.classList.remove('on');
  });
}

</script>
</body>
</html>
