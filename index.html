<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>BritChat — Free UK Chat Rooms</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCI+PGNpcmNsZSBjeD0iMzIiIGN5PSIzMiIgcj0iMzIiIGZpbGw9IiMwODBmMDgiLz48Y2lyY2xlIGN4PSIzMiIgY3k9IjM0IiByPSIxOCIgZmlsbD0iIzhCNDUxMyIvPjxwYXRoIGQ9Ik0xOCAyMiBMMjIgMTIgTDI3IDIwIEwzMiAxMCBMMzcgMjAgTDQyIDEyIEw0NiAyMiBaIiBmaWxsPSIjRkZENzAwIi8+PHJlY3QgeD0iMTgiIHk9IjIwIiB3aWR0aD0iMjgiIGhlaWdodD0iNSIgcng9IjIiIGZpbGw9IiNGRkQ3MDAiLz48L3N2Zz4=">
<style>
:root{
  --bg:#080f08;--bg2:#0d180d;--bg3:#0f1e0f;
  --surface:#162316;--surface2:#1c2e1c;--surface3:#223322;
  --border:rgba(80,180,60,.14);--border2:rgba(80,180,60,.28);
  --green:#2d7a2d;--green2:#3aaa3a;--green3:#4dc44d;
  --gold:#c8960c;--gold2:#f0c060;
  --text:#e0f0e0;--text2:rgba(180,230,180,.55);--text3:rgba(180,230,180,.28);
  --accent:#44cc44;--danger:#cc3333;--online:#44dd88;
  --sans:'DM Sans',sans-serif;--display:'Syne',sans-serif;
  --msg-radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans)}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 60% at 10% 20%,rgba(45,122,45,.2) 0%,transparent 60%),
    radial-gradient(ellipse 50% 70% at 90% 80%,rgba(200,150,12,.08) 0%,transparent 60%)}

/* ══ LOADING ══ */
#loading{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green3);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══ AUTH ══ */
#auth{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:16px;background:var(--bg)}
.acard{background:linear-gradient(145deg,var(--bg2),var(--bg3));border:1px solid var(--border2);border-radius:20px;padding:26px 22px;width:100%;max-width:360px;box-shadow:0 24px 80px rgba(0,0,0,.7);position:relative;z-index:1}
.alogo{font-family:var(--display);font-size:28px;font-weight:900;color:var(--gold2);text-align:center;margin-bottom:4px;cursor:pointer;user-select:none}
.asub{text-align:center;font-size:11px;color:var(--text2);margin-bottom:18px;letter-spacing:.5px}
.atabs{display:flex;background:var(--surface);border-radius:10px;padding:3px;margin-bottom:16px}
.atab{flex:1;padding:8px;border:none;background:none;color:var(--text2);font-family:var(--sans);font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;transition:all .2s}
.atab.on{background:var(--green);color:#fff}
.f{margin-bottom:10px}
.f label{display:block;font-size:10px;font-weight:800;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.6px}
.f input,.f select{width:100%;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;transition:border .2s}
.f input:focus,.f select:focus{border-color:var(--green3)}
.f select option{background:var(--bg2)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.abtn{width:100%;padding:13px;background:linear-gradient(135deg,var(--green),var(--green2));border:none;border-radius:10px;color:#fff;font-family:var(--display);font-size:15px;font-weight:800;cursor:pointer;letter-spacing:.3px;transition:all .15s;margin-top:4px}
.abtn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.aerr{font-size:12px;color:#ff8888;text-align:center;margin-top:6px;min-height:16px}
.adiv{display:flex;align-items:center;gap:10px;margin:12px 0;font-size:11px;color:var(--text3)}
.adiv::before,.adiv::after{content:'';flex:1;height:1px;background:var(--border)}
.aplink{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 14px;background:rgba(200,150,12,.1);border:1px solid rgba(200,150,12,.3);border-radius:10px;color:var(--gold2);font-size:13px;font-weight:700;text-decoration:none;transition:all .15s}
.aplink:hover{background:rgba(200,150,12,.2)}
.av-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:10px}
.av-b{aspect-ratio:1;border-radius:8px;border:2px solid transparent;background:var(--surface);font-size:18px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.av-b:hover{border-color:var(--green3)}
.av-b.sel{border-color:var(--gold);background:rgba(200,150,12,.15)}

/* ══ APP ══ */
#app{display:none;height:100%;flex-direction:column;position:relative;z-index:1}
#app.on{display:flex}

/* TOPBAR */
.topbar{height:50px;display:flex;align-items:center;gap:8px;padding:0 12px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);z-index:50;position:relative}
.tlogo{font-family:var(--display);font-size:20px;font-weight:900;color:var(--gold2);letter-spacing:-.5px;cursor:pointer;user-select:none;flex-shrink:0}
.tmid{flex:1;display:flex;align-items:center;gap:5px;overflow:hidden}
.rpill{padding:5px 10px;border-radius:20px;font-size:11px;font-weight:700;background:var(--surface);border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.rpill.on{background:var(--green);border-color:var(--green3);color:#fff}
.rpill:hover:not(.on){background:var(--surface2);color:var(--text)}
.tright{display:flex;gap:5px;align-items:center;flex-shrink:0}
.uchip{display:flex;align-items:center;gap:6px;padding:4px 10px 4px 4px;background:var(--surface);border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:all .15s;max-width:150px}
.uchip:hover{background:var(--surface2)}
.uchip-av{width:28px;height:28px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden;flex-shrink:0}
.uchip-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.uchip-name{font-size:12px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* BODY */
.body{flex:1;display:flex;overflow:hidden;min-height:0}

/* SIDEBAR */
.sidebar{width:178px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
@media(max-width:680px){.sidebar{display:none}}
.sb-scroll{flex:1;overflow-y:auto;padding:6px 0}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.sb-grp{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:10px 12px 4px}
.sb-r{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:8px;border:none;background:none;color:var(--text2);font-family:var(--sans);font-size:12px;font-weight:500;width:100%;text-align:left;cursor:pointer;transition:all .15s;position:relative}
.sb-r:hover{background:var(--surface);color:var(--text)}
.sb-r.on{background:var(--green);color:#fff}
.sb-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-cnt{font-size:10px;opacity:.6;flex-shrink:0}
.sb-live{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;background:var(--online);animation:livepulse 2s infinite}
@keyframes livepulse{0%,100%{opacity:1;transform:translateY(-50%) scale(1)}50%{opacity:.5;transform:translateY(-50%) scale(.8)}}
.sb-div{height:1px;background:var(--border);margin:5px 10px}
.sb-poker{margin:8px;border-radius:9px;background:linear-gradient(135deg,rgba(200,150,12,.18),rgba(200,150,12,.06));border:1px solid rgba(200,150,12,.3)}
.sb-poker a{display:flex;align-items:center;gap:8px;padding:9px 11px;color:var(--gold2);font-size:12px;font-weight:700;text-decoration:none}
.sb-out{padding:8px}
.sb-out button{width:100%;padding:7px;background:rgba(200,50,50,.15);border:1px solid rgba(200,50,50,.3);color:#ff8888;border-radius:8px;cursor:pointer;font-size:12px;font-family:var(--sans)}

/* ══ CHAT AREA ══ */
.chat-wrap{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;position:relative}

/* CHAT BANNER */
.banner{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.ban-av{font-size:22px;flex-shrink:0}
.ban-info{flex:1;min-width:0}
.ban-name{font-size:14px;font-weight:800;color:var(--text)}
.ban-sub{font-size:11px;color:var(--text2)}
.ban-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.live-badge{font-size:11px;color:var(--online);font-weight:700;background:rgba(68,221,136,.1);border:1px solid rgba(68,221,136,.25);padding:3px 9px;border-radius:20px;white-space:nowrap}
.mode-toggle{display:flex;background:var(--surface);border-radius:20px;padding:2px;border:1px solid var(--border)}
.mt-btn{padding:4px 10px;border:none;background:none;border-radius:18px;font-size:11px;font-weight:700;color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap}
.mt-btn.on{background:var(--green);color:#fff}

/* MESSAGE LIST — our own beautiful renderer */
.msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:1px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* MESSAGE ROW */
.msg-row{display:flex;align-items:flex-start;gap:9px;padding:4px 6px;border-radius:10px;transition:background .15s;position:relative}
.msg-row:hover{background:rgba(255,255,255,.03)}
.msg-row.mine{flex-direction:row-reverse}

/* AVATAR */
.msg-av{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden;cursor:pointer}
.msg-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.msg-av.bot-av{border-color:rgba(150,80,220,.4);background:rgba(150,80,220,.1)}

/* MESSAGE BUBBLE */
.msg-bub{flex:1;min-width:0;max-width:85%}
.msg-row.mine .msg-bub{align-items:flex-end;display:flex;flex-direction:column}
.msg-meta{display:flex;align-items:baseline;gap:6px;margin-bottom:3px;flex-wrap:wrap}
.msg-row.mine .msg-meta{flex-direction:row-reverse}
.msg-name{font-size:12px;font-weight:800;cursor:pointer}
.msg-name:hover{text-decoration:underline}
.msg-time{font-size:10px;color:var(--text3)}
.msg-badge{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:800}
.badge-bot{background:rgba(150,80,220,.25);color:#cc88ff}
.badge-admin{background:rgba(200,50,50,.25);color:#ff8888}
.badge-bc{background:rgba(68,204,68,.2);color:var(--accent)}

/* BUBBLE */
.bubble{
  display:inline-block;padding:8px 12px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:4px var(--msg-radius) var(--msg-radius) var(--msg-radius);
  font-size:14px;line-height:1.5;color:var(--text);
  word-break:break-word;max-width:100%;
}
.msg-row.mine .bubble{
  background:linear-gradient(135deg,var(--green),rgba(45,122,45,.8));
  border-color:rgba(80,180,60,.3);color:#fff;
  border-radius:var(--msg-radius) 4px var(--msg-radius) var(--msg-radius);
}
.bubble img{max-width:200px;border-radius:8px;margin-top:4px;display:block}
.bubble a{color:var(--green3);text-decoration:none}
.bubble a:hover{text-decoration:underline}
.bubble .yt-embed{max-width:240px;border-radius:8px;overflow:hidden;margin-top:6px}
.bubble .yt-embed img{width:100%;border-radius:0}

/* Bot bubble */
.msg-row.bot-row .bubble{
  background:linear-gradient(135deg,rgba(150,80,220,.2),rgba(100,50,180,.15));
  border-color:rgba(150,80,220,.3);
}

/* System message */
.sys-msg{text-align:center;font-size:11px;color:var(--text3);padding:4px 0;font-style:italic}

/* REACTIONS */
.msg-reactions{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.msg-row.mine .msg-reactions{justify-content:flex-end}
.react-pill{display:flex;align-items:center;gap:3px;padding:2px 7px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:13px;cursor:pointer;transition:all .15s}
.react-pill:hover{background:var(--surface2)}
.react-count{font-size:11px;color:var(--text2)}

/* TYPING */
.typing-row{height:20px;padding:0 14px;display:flex;align-items:center;font-size:11px;color:var(--text3);font-style:italic;flex-shrink:0}
.tdots span{animation:blink 1.4s infinite both}
.tdots span:nth-child(2){animation-delay:.2s}
.tdots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* ══ INPUT BAR — OUR OWN BEAUTIFUL ONE ══ */
.input-bar{padding:10px 12px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
.input-toolbar{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.fmt-btn{padding:3px 9px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:12px;cursor:pointer;font-family:var(--sans);transition:all .15s}
.fmt-btn:hover{background:var(--surface2);color:var(--text)}
.fmt-btn.on{background:var(--green);border-color:var(--green3);color:#fff}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-wrap{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:9px 13px;display:flex;align-items:flex-end;gap:8px;transition:border .2s}
.input-wrap:focus-within{border-color:var(--green3);background:var(--surface2)}
#msginput{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--sans);font-size:14px;resize:none;min-height:22px;max-height:100px;line-height:1.45}
#msginput::placeholder{color:var(--text3)}
.eq-btns{display:flex;gap:2px;flex-shrink:0}
.eq{background:none;border:none;font-size:18px;cursor:pointer;opacity:.5;transition:opacity .15s;line-height:1;padding:1px}
.eq:hover{opacity:1}
.send-btn{width:40px;height:40px;border-radius:12px;background:var(--green);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.send-btn:hover{background:var(--green2);transform:scale(1.05)}
.send-btn:active{transform:scale(.95)}
.char-count{font-size:10px;color:var(--text3);text-align:right;padding:2px 4px 0}

/* ══ ADDACHAT IFRAME — hidden, used as backend for public rooms ══ */
#ac-frame{position:fixed;top:-9999px;left:-9999px;width:400px;height:400px;border:none;opacity:0;pointer-events:none}

/* ══ PUBLIC ROOM NOTICE ══ */
#public-notice{display:none;background:rgba(200,150,12,.08);border:1px solid rgba(200,150,12,.2);border-radius:10px;margin:10px 14px;padding:10px 12px;font-size:12px;color:rgba(200,200,100,.7)}

/* ══ OVERLAYS ══ */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:500;display:none;align-items:center;justify-content:center;padding:16px}
.ov.on{display:flex}
.ov-card{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:22px;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,.7);max-height:90vh;overflow-y:auto}
.ov-card h3{font-family:var(--display);font-size:18px;font-weight:800;color:var(--gold2);margin-bottom:14px}
.ov-card::-webkit-scrollbar{width:3px}
.ov-card::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ROOMS DRAWER */
.drawer{position:fixed;inset:0;z-index:400;background:var(--bg2);display:none;flex-direction:column}
.drawer.on{display:flex}
.drawer-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.drawer-title{font-family:var(--display);font-size:18px;font-weight:800;color:var(--gold2)}
.drawer-close{background:var(--surface);border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.drawer-body{flex:1;overflow-y:auto;padding:10px}

/* MOBILE NAV */
.mnav{display:none;background:var(--bg2);border-top:1px solid var(--border);padding:5px 4px;flex-shrink:0}
@media(max-width:680px){
  .mnav{display:flex;justify-content:space-around}
  .tmid{display:none}
}
.mn-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--text3);cursor:pointer;font-family:var(--sans);font-size:10px;font-weight:700;padding:5px 10px;border-radius:8px;transition:all .15s}
.mn-btn.on{color:var(--accent)}
.mn-icon{font-size:19px}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:10px 22px;border-radius:30px;font-size:13px;font-weight:600;z-index:9999;display:none;box-shadow:0 8px 32px rgba(0,0,0,.5);white-space:nowrap}

/* USER POPUP */
.user-popup{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:700;display:none;align-items:center;justify-content:center;padding:16px}
.user-popup.on{display:flex}
.user-popup-card{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:22px;width:100%;max-width:280px;text-align:center}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>
<body>

<!-- HIDDEN ADDACHAT IFRAME — backend for public rooms -->
<iframe id="ac-frame" src="about:blank" allow="camera;microphone"></iframe>

<div id="loading">
  <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:900;color:var(--gold2)">🐒 BritChat</div>
  <div class="spin"></div>
</div>

<!-- AUTH -->
<div id="auth">
  <div class="acard">
    <div class="alogo" id="logo-tap">🐒 BritChat</div>
    <div class="asub">🇬🇧 Free UK Chat · Same login as Poker Chimps 🎰</div>
    <div class="atabs">
      <button class="atab on" id="ti" onclick="swTab('in')">Sign In</button>
      <button class="atab" id="tu" onclick="swTab('up')">Register</button>
    </div>
    <div id="fi">
      <div class="f"><label>Username</label><input id="su" placeholder="your_username" autocapitalize="none" autocomplete="username"></div>
      <div class="f"><label>Password</label><input id="sp" type="password" placeholder="••••••" onkeydown="if(event.key==='Enter')doIn()"></div>
      <button class="abtn" onclick="doIn()">Sign In →</button>
      <div class="aerr" id="se"></div>
    </div>
    <div id="fu" style="display:none">
      <div class="f"><label>Username</label><input id="ru" placeholder="choose_username" autocapitalize="none"></div>
      <div class="f"><label>Password</label><input id="rp" type="password" placeholder="min 4 characters"></div>
      <div class="f"><label>Confirm</label><input id="rp2" type="password" placeholder="repeat password" onkeydown="if(event.key==='Enter')doUp()"></div>
      <div class="frow">
        <div class="f"><label>Age</label><input id="ra" type="number" placeholder="25" min="13" max="99"></div>
        <div class="f"><label>Gender</label><select id="rs"><option value="">Prefer not</option><option>Male</option><option>Female</option><option>Other</option></select></div>
      </div>
      <div class="f"><label>Location</label><input id="rl" placeholder="London, UK" maxlength="30"></div>
      <div style="margin-bottom:10px">
        <div style="font-size:10px;font-weight:800;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px">Your Avatar</div>
        <div class="av-grid" id="av-g"></div>
        <label style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface);border:1px dashed var(--border2);border-radius:8px;cursor:pointer;margin-top:6px">

<script>
/* ══════════════════════════════════════════════════════════════
   BRITCHAT v4 — Full Custom Chat UI
   
   Architecture:
   ─────────────
   • OUR Firebase (/msgs/roomid) = message storage + retrieval
   • OUR beautiful UI = avatars, bubbles, typing indicators
   • AddaChat iframe = HIDDEN, used only for public room activity
   • Bots = multiple personalities posting via Firebase
   • 100% feels like OUR site — no trace of AddaChat in UI
══════════════════════════════════════════════════════════════ */

const FB = 'https://britchat-6faa5-default-rtdb.firebaseio.com';

/* ── ROOMS ── */
const ROOMS = [
  {id:'lobby',    name:'Lobby',          icon:'💬', desc:'Main BritChat room',          group:'🇬🇧 BritChat', color:'#44cc44'},
  {id:'pub',      name:'The Pub',        icon:'🍺', desc:'Pull up a stool',             group:'🇬🇧 BritChat', color:'#cc8844'},
  {id:'sport',    name:'Sport',          icon:'⚽', desc:'Football, cricket & more',    group:'🇬🇧 BritChat', color:'#4488cc'},
  {id:'poker',    name:'Poker Lounge',   icon:'🎰', desc:'Strategy & banter',           group:'🇬🇧 BritChat', color:'#c8960c'},
  {id:'dating',   name:'Dating & Chat',  icon:'💞', desc:'Meet new people',             group:'🇬🇧 BritChat', color:'#cc4488'},
  {id:'music',    name:'Music',          icon:'🎵', desc:'British & world music',       group:'🇬🇧 BritChat', color:'#8844cc'},
  {id:'news',     name:'UK News',        icon:'📰', desc:'News & current affairs',      group:'🇬🇧 BritChat', color:'#4488cc'},
  {id:'gaming',   name:'Gaming',         icon:'🎮', desc:'Console, PC & mobile',        group:'🇬🇧 BritChat', color:'#44aacc'},
  {id:'over30s',  name:'30s & Over',     icon:'🎯', desc:'Chat for grown-ups',          group:'🇬🇧 BritChat', color:'#88cc44'},
];

/* ── BOT PERSONALITIES ── */
const BOTS = [
  {id:'bot_chimp',   name:'ChimpBot',    av:'🐒', color:'#44cc44',   badge:'BOT', role:'Friendly host — welcomes users, shares BritChat tips'},
  {id:'bot_pete',    name:'PokerPete',   av:'🎰', color:'#f0c060',   badge:'BOT', role:'Poker enthusiast — shares tips, celebrates wins'},
  {id:'bot_banter',  name:'BritBanter',  av:'🇬🇧',color:'#4488ff',  badge:'BOT', role:'Funny Brit — football, banter, British humour'},
  {id:'bot_lucky',   name:'LuckyLass',   av:'🍀', color:'#ff88cc',   badge:'BOT', role:'Irish girl — craic, gossip, warmth'},
];

/* Random emoji pool for unknown users */
const EMOJIS = ['🦊','🐯','🦁','🐻','🐼','🦝','🐺','🦮','🐱','🐰','🐸','🦅','🦉','🌊','⚡','🔥','🌙','👾','🤖','🎭','🎩','💀','👑','💎','🌟','🎯','🧙','🦸','🧊','🎪'];

const AVEMOJIS = ['🐒','🦍','🦧','🐵','😎','🤠','🧐','😏','👑','💎','🎩','🃏','🌟','🔥','💀','👾','🦊','🐻','🎭','🤖','🏋️','🧙','🦁','🐯','🐺','🎅','🧛','🤴','👸','🧝'];

let me = null;
let curRoom = 'lobby';
let msgInterval = null;
let typingInterval = null;
let presenceInterval = null;
let lastMsgTs = 0;
let typingTimer = null;
let fmt = {bold:false,italic:false,underline:false};
let regPhotoData = null;
let roomUserCounts = {};

/* ══ INIT ══ */
window.onload = () => {
  buildAvGrid();
  const sess = localStorage.getItem('nt_session');
  if(sess){
    const ud = getLocal(sess);
    if(ud){ me=ud; launch(); return; }
    fetch(FB+'/pc_users/'+sess+'.json').then(r=>r.json()).then(d=>{
      if(d&&(d.username||d.name)){
        me=d; try{localStorage.setItem('pc_user_'+sess,JSON.stringify(d));}catch(e){}
        launch();
      } else showAuth();
    }).catch(()=>showAuth());
    return;
  }
  showAuth();
};

function getLocal(u){
  try{const r=localStorage.getItem('pc_user_'+u);if(r)return JSON.parse(r);}catch(e){}
  try{const a=JSON.parse(localStorage.getItem('nt_users')||'{}');if(a[u])return a[u];}catch(e){}
  return null;
}
function showAuth(){
  document.getElementById('loading').style.display='none';
  document.getElementById('auth').style.display='flex';
}

/* ── AVATAR GRID ── */
function buildAvGrid(){
  const g=document.getElementById('av-g'); if(!g||g.children.length>1)return;
  AVEMOJIS.forEach((a,i)=>{
    const b=document.createElement('button');b.className='av-b'+(i===0?' sel':'');
    b.textContent=a;b.type='button';
    b.onclick=()=>{g.querySelectorAll('.av-b').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');regPhotoData=null;document.getElementById('reg-photo-preview').style.display='none';};
    g.appendChild(b);
  });
}

function handleRegPhoto(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    regPhotoData=ev.target.result;
    const prev=document.getElementById('reg-photo-preview');
    prev.style.display='block';prev.textContent='✅ Photo selected';
    document.querySelectorAll('.av-b').forEach(x=>x.classList.remove('sel'));
  };r.readAsDataURL(f);
}

/* ══ AUTH ══ */
function swTab(t){
  ['in','up'].forEach(x=>{
    document.getElementById('t'+x).classList.toggle('on',x===t);
    document.getElementById('f'+x).style.display=x===t?'block':'none';
  });
}

function doIn(){
  const u=document.getElementById('su').value.trim().toLowerCase().replace(/\s+/g,'_');
  const p=document.getElementById('sp').value;
  const err=document.getElementById('se');
  if(!u||!p){err.textContent='Please fill in all fields';return;}
  const ud=getLocal(u);
  if(ud){
    const h=btoa(unescape(encodeURIComponent(p)));
    if(ud.password===h||ud.password===btoa(p)||ud.password===p){
      me=ud;localStorage.setItem('nt_session',u);
      document.getElementById('auth').style.display='none';launch();
    }else err.textContent='Incorrect password';
    return;
  }
  err.textContent='Checking…';
  fetch(FB+'/pc_users/'+u+'.json').then(r=>r.json()).then(d=>{
    if(!d){err.textContent='Username not found';return;}
    const h=btoa(unescape(encodeURIComponent(p)));
    if(d.password===h||d.password===btoa(p)){
      me=d;localStorage.setItem('pc_user_'+u,JSON.stringify(d));localStorage.setItem('nt_session',u);
      document.getElementById('auth').style.display='none';launch();
    }else err.textContent='Incorrect password';
  }).catch(()=>err.textContent='Connection error');
}

function doUp(){
  const u=document.getElementById('ru').value.trim().toLowerCase().replace(/\s+/g,'_');
  const p=document.getElementById('rp').value,p2=document.getElementById('rp2').value;
  const age=document.getElementById('ra').value||'',sex=document.getElementById('rs').value||'',loc=document.getElementById('rl').value.trim()||'';
  const selAv=document.querySelector('#av-g .av-b.sel')?.textContent||'🐒';
  const av = regPhotoData || selAv;
  const err=document.getElementById('re');
  if(!u||u.length<2){err.textContent='Min 2 chars';return;}
  if(!/^[a-z0-9_]+$/.test(u)){err.textContent='Letters, numbers, _ only';return;}
  if(!p||p.length<4){err.textContent='Min 4 char password';return;}
  if(p!==p2){err.textContent='Passwords must match';return;}
  if(localStorage.getItem('pc_user_'+u)){err.textContent='Username taken';return;}
  const dn=u.split('_').map(w=>w[0].toUpperCase()+w.slice(1)).join(' ');
  const ud={username:u,name:dn,password:btoa(unescape(encodeURIComponent(p))),avatar:av,color:'#c8960c',chips:10000,joinedAt:Date.now(),age,sex,location:loc,profile:{wins:0,losses:0,handsPlayed:0,biggestWin:0,totalWon:0},friends:[],friendRequests:[]};
  localStorage.setItem('pc_user_'+u,JSON.stringify(ud));
  try{const a=JSON.parse(localStorage.getItem('nt_users')||'{}');a[u]=ud;localStorage.setItem('nt_users',JSON.stringify(a));}catch(e){}
  fetch(FB+'/pc_users/'+u+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(ud)}).catch(()=>{});
  localStorage.setItem('nt_session',u);me=ud;
  document.getElementById('auth').style.display='none';launch();
}

function doOut(){
  clearInterval(msgInterval);clearInterval(typingInterval);clearInterval(presenceInterval);
  localStorage.removeItem('nt_session');me=null;
  document.getElementById('app').classList.remove('on');
  document.getElementById('auth').style.display='flex';
  swTab('in');
}

/* ══ LAUNCH ══ */
function launch(){
  document.getElementById('loading').style.display='none';
  document.getElementById('auth').style.display='none';
  document.getElementById('app').classList.add('on');
  updateChip();buildRoomLists();
  joinRoom('lobby');
  startPresence();
  setTimeout(startBots, 10000); // bots start after 10s
}

function updateChip(){
  if(!me)return;
  const av=me.avatar||'🐒';
  const isPhoto = av.startsWith('data:');
  const inner=document.getElementById('uchip-av-inner');
  const avEl=document.getElementById('uchip-av');
  if(isPhoto){
    avEl.innerHTML=`<img src="${av}" alt="av">`;
  } else {
    avEl.innerHTML=`<span id="uchip-av-inner" style="font-size:16px">${av}</span>`;
  }
  document.getElementById('uchip-name').textContent=me.name||me.username;
  document.getElementById('mn-av').textContent=isPhoto?'📷':av;
}

/* ══ ROOM BUILDING ══ */
function buildRoomLists(){buildSidebar();buildPills();buildDrawer();}

function buildSidebar(){
  const el=document.getElementById('sb-list');el.innerHTML='';
  const groups={};ROOMS.forEach(r=>{if(!groups[r.group])groups[r.group]=[];groups[r.group].push(r);});
  Object.entries(groups).forEach(([g,rooms])=>{
    const t=document.createElement('div');t.className='sb-grp';t.textContent=g;el.appendChild(t);
    rooms.forEach(r=>{
      const b=document.createElement('button');
      b.className='sb-r'+(r.id===curRoom?' on':'');b.id='sbr-'+r.id;
      b.innerHTML=`<span class="sb-icon">${r.icon}</span><span class="sb-name">${r.name}</span><span class="sb-cnt" id="sc-${r.id}"></span>`;
      b.onclick=()=>joinRoom(r.id);
      el.appendChild(b);
    });
    const d=document.createElement('div');d.style.cssText='height:1px;background:var(--border);margin:5px 10px';el.appendChild(d);
  });
}
function buildPills(){
  const el=document.getElementById('pills');
  el.innerHTML=ROOMS.slice(0,5).map(r=>`<div class="rpill${r.id===curRoom?' on':''}" id="pil-${r.id}" onclick="joinRoom('${r.id}')">${r.icon} ${r.name}</div>`).join('');
}
function buildDrawer(){
  const el=document.getElementById('dr-list');el.innerHTML='';
  ROOMS.forEach(r=>{
    const b=document.createElement('div');
    b.style.cssText='display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:10px;cursor:pointer;transition:background .15s';
    b.innerHTML=`<div style="width:38px;height:38px;border-radius:10px;background:rgba(${hexToRgb(r.color)},.15);border:1px solid rgba(${hexToRgb(r.color)},.3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${r.icon}</div><div><div style="font-size:14px;font-weight:700;color:var(--text)">${r.name}</div><div style="font-size:11px;color:var(--text2)">${r.desc}</div></div>`;
    b.onmouseover=()=>b.style.background='var(--surface)';b.onmouseout=()=>b.style.background='';
    b.onclick=()=>{joinRoom(r.id);toggleDrawer();};
    el.appendChild(b);
  });
}
function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

/* ══ JOIN ROOM ══ */
function joinRoom(id){
  clearInterval(msgInterval);clearInterval(typingInterval);
  // Clear presence from old room
  if(me&&curRoom) setRoomPresence(curRoom, false);
  
  curRoom=id;
  const r=ROOMS.find(x=>x.id===id)||ROOMS[0];
  lastMsgTs=0;
  
  document.getElementById('ban-av').textContent=r.icon;
  document.getElementById('ban-name').textContent=r.name;
  document.getElementById('ban-sub').textContent=r.desc;
  document.getElementById('msgs').innerHTML='';
  document.getElementById('typing-row').innerHTML='';
  
  document.querySelectorAll('.sb-r').forEach(b=>b.classList.toggle('on',b.id==='sbr-'+id));
  document.querySelectorAll('.rpill').forEach(b=>b.classList.toggle('on',b.id==='pil-'+id));
  
  // Join presence in new room
  setRoomPresence(id, true);
  // Start listening to messages
  loadMessages(id);
  msgInterval = setInterval(()=>pollMessages(id), 2500);
  typingInterval = setInterval(()=>pollTyping(id), 2000);
}

/* ══ PRESENCE ══ */
function setRoomPresence(roomId, active){
  if(!me)return;
  if(active){
    const data={username:me.username,name:me.name,avatar:me.avatar||'🐒',color:me.color||'#44cc44',ts:Date.now()};
    fetch(FB+'/bc_rooms/'+roomId+'/presence/'+me.username+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}).catch(()=>{});
  } else {
    fetch(FB+'/bc_rooms/'+roomId+'/presence/'+me.username+'.json',{method:'DELETE'}).catch(()=>{});
  }
}

function startPresence(){
  setInterval(()=>{
    if(me&&curRoom) setRoomPresence(curRoom, true);
    // Update room counts
    ROOMS.forEach(r=>{
      fetch(FB+'/bc_rooms/'+r.id+'/presence.json')
        .then(res=>res.json()).then(d=>{
          const now=Date.now();
          const count=d?Object.values(d).filter(u=>u&&u.ts&&(now-u.ts)<90000).length:0;
          const el=document.getElementById('sc-'+r.id);
          if(el) el.textContent=count>0?count:'';
          if(r.id===curRoom){
            const ol=document.getElementById('online-count');
            if(ol) ol.textContent='🟢 '+count+' here';
          }
        }).catch(()=>{});
    });
  }, 30000);
}

/* ══ MESSAGES ══ */
function loadMessages(roomId){
  // Load last 50 messages
  fetch(FB+'/bc_msgs/'+roomId+'.json?orderBy="ts"&limitToLast=50')
    .then(r=>r.json()).then(d=>{
      if(!d)return;
      const msgs=Object.values(d).filter(Boolean).sort((a,b)=>a.ts-b.ts);
      msgs.forEach(m=>{
        if(m.ts>lastMsgTs)lastMsgTs=m.ts;
        renderMsg(m);
      });
      scrollBottom();
    }).catch(()=>{});
}

function pollMessages(roomId){
  if(!lastMsgTs) return;
  fetch(FB+'/bc_msgs/'+roomId+'.json?orderBy="ts"&startAt='+(lastMsgTs+1)+'&limitToLast=20')
    .then(r=>r.json()).then(d=>{
      if(!d)return;
      const msgs=Object.values(d).filter(Boolean).sort((a,b)=>a.ts-b.ts);
      msgs.forEach(m=>{
        if(m.ts>lastMsgTs){lastMsgTs=m.ts;renderMsg(m);scrollIfNear();}
      });
    }).catch(()=>{});
}

function pollTyping(roomId){
  fetch(FB+'/bc_typing/'+roomId+'.json')
    .then(r=>r.json()).then(d=>{
      const now=Date.now();
      const typers=d?Object.entries(d).filter(([u,ts])=>u!==me?.username&&(now-ts)<4000).map(([u])=>u.replace(/_/g,' ')):[];
      const el=document.getElementById('typing-row');
      if(typers.length){
        el.innerHTML=typers.join(', ')+' typing <span class="tdots"><span>•</span><span>•</span><span>•</span></span>';
      }else el.innerHTML='';
    }).catch(()=>{});
}

/* ══ RENDER MESSAGE — beautiful with avatars ══ */
function renderMsg(msg){
  if(!msg||!msg.text&&!msg.system)return;
  const el=document.getElementById('msgs');
  
  // System message
  if(msg.system){
    const d=document.createElement('div');d.className='sys-msg';d.textContent=msg.text;el.appendChild(d);return;
  }
  
  const isMe = msg.username===me?.username;
  const isBot = msg.bot || BOTS.some(b=>b.id===msg.username);
  
  const row=document.createElement('div');
  row.className='msg-row'+(isMe?' mine':'')+(isBot?' bot-row':'');
  row.dataset.ts=msg.ts;
  
  // Avatar
  const avDiv=document.createElement('div');
  avDiv.className='msg-av'+(isBot?' bot-av':'');
  avDiv.title=msg.name||msg.username||'?';
  
  const av = msg.avatar||'👤';
  const isPhoto = av.startsWith('data:') || av.startsWith('http');
  if(isPhoto){
    avDiv.innerHTML=`<img src="${av}" alt="${msg.name||''}">`;
  } else {
    avDiv.textContent=av;
    avDiv.style.fontSize='20px';
  }
  avDiv.onclick=()=>showUserPopup(msg);
  
  // Build bubble content
  let bubbleHtml = formatText(msg.text, msg.fmt||{});
  
  // Name + meta
  const nameColor = msg.color||'#44cc44';
  const badge = isBot ? '<span class="msg-badge badge-bot">BOT</span>' : (msg.britchat ? '<span class="msg-badge badge-bc">BC</span>' : '');
  
  row.innerHTML=`
    <div class="msg-bub">
      <div class="msg-meta">
        <span class="msg-name" style="color:${nameColor}" onclick="showUserPopup(${JSON.stringify(msg).replace(/"/g,"'")})">${msg.name||msg.username||'?'}</span>
        ${badge}
        <span class="msg-time">${timeSince(msg.ts)}</span>
      </div>
      <div class="bubble">${bubbleHtml}</div>
    </div>`;
  
  row.prepend(avDiv);
  el.appendChild(row);
}

function formatText(text, fmt){
  if(!text)return '';
  let t=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // URLs
  t=t.replace(/(https?:\/\/[^\s]+)/g,(url)=>{
    // YouTube thumbnail
    const yt=url.match(/youtube\.com\/watch\?v=([^&\s]+)|youtu\.be\/([^\s]+)/);
    if(yt){
      const vid=yt[1]||yt[2];
      return `<a href="${url}" target="_blank" rel="noopener">▶ YouTube</a> <div class="yt-embed"><img src="https://img.youtube.com/vi/${vid}/mqdefault.jpg" alt="video"></div>`;
    }
    // Image URLs
    if(/\.(jpg|jpeg|png|gif|webp)(\?|$)/i.test(url)){
      return `<img src="${url}" alt="img" onerror="this.style.display='none'">`;
    }
    return `<a href="${url}" target="_blank" rel="noopener">${url.length>40?url.slice(0,40)+'…':url}</a>`;
  });
  if(fmt.bold)t=`<b>${t}</b>`;
  if(fmt.italic)t=`<em>${t}</em>`;
  if(fmt.underline)t=`<u>${t}</u>`;
  return t;
}

function scrollBottom(){

function sendMsg(){
  const inp=document.getElementById('msginput');
  const text=inp.value.trim();
  if(!text||!me)return;
  inp.value='';autoH(inp);
  document.getElementById('char-count').textContent='';
  
  const msg={
    username:me.username,name:me.name,
    avatar:me.avatar||'🐒',color:me.color||'#44cc44',
    text,ts:Date.now(),fmt:{...fmt},
    britchat:true, // marks as BritChat user (not AddaChat visitor)
  };
  
  // Save to Firebase
  fetch(FB+'/bc_msgs/'+curRoom+'.json',{
    method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(msg)
  }).catch(()=>{});
  
  // Clear typing
  fetch(FB+'/bc_typing/'+curRoom+'/'+me.username+'.json',{method:'DELETE'}).catch(()=>{});
  
  // Optimistic render
  renderMsg(msg);scrollBottom();
  
  // Reset formatting
  fmt={bold:false,italic:false,underline:false};
  ['b','i','u'].forEach(k=>document.getElementById('fb-'+k)?.classList.remove('on'));
}

function autoH(el){
  el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';
  const remaining=500-el.value.length;

let botStarted = false;
function startBots(){
  if(botStarted||!me)return;
  botStarted=true;
  
  BOTS.forEach((bot,i)=>{
    // Each bot posts to a random room with staggered timing
    const rooms=['lobby','pub','sport','poker'];
    const room=rooms[i%rooms.length];
    
    setTimeout(()=>botPost(bot, room), (i+1)*12000);
    
    // Keep bots active with periodic posts
    setInterval(()=>{
      if(Math.random()<0.3){ // 30% chance each interval
        botPost(bot, room);
      }
    }, 120000 + (i*30000)); // every 2-5 mins
  });
}

function botPost(bot, roomId){
  const lines = BOT_LINES[roomId]||BOT_LINES.lobby;
  const text = lines[Math.floor(Math.random()*lines.length)];
  
  const msg={
    username:bot.id, name:bot.name,
    avatar:bot.av, color:bot.color,
    text, ts:Date.now(),
    bot:true, britchat:true,
  };
  
  fetch(FB+'/bc_msgs/'+roomId+'.json',{
    method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(msg)
  }).catch(()=>{});
  
  // If we're in that room, render it
  if(roomId===curRoom){ renderMsg(msg); scrollIfNear(); }
}

let aiCooldown=false;
async function getAIResponse(userMsg, botPersona){
  if(aiCooldown)return null;
  aiCooldown=true;
  setTimeout(()=>aiCooldown=false, 45000);
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:80,
        messages:[{role:'user',content:`You are ${botPersona} in a UK chat room called BritChat. Someone said: "${userMsg}". Reply in character, 1-2 casual British sentences, max 80 chars. No hashtags.`}]
      })
    });
    const d=await res.json();
    return d.content?.[0]?.text||null;
  }catch(e){return null;}
}

function timeSince(ts){
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60)return 'just now';
  if(s<3600)return Math.floor(s/60)+'m';
  if(s<86400)return Math.floor(s/3600)+'h';
  return new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}
